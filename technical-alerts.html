<!DOCTYPE html>
<html lang="en" dir="ltr" id="root">
<head>
<meta charset="UTF-8">
<script>
  function lsGet(k, def) { try { return localStorage.getItem(k) || def; } catch (e) { return def; } }
  var initialLang = lsGet('se_lang_v2', 'en');
  document.documentElement.lang = initialLang;
  document.documentElement.dir = (initialLang === 'ar' || initialLang === 'ur') ? 'rtl' : 'ltr';
</script>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>SE · Technical Alerts</title>
<link rel="stylesheet" href="styles.css">
<style>
:root{--DC:#EF4444;--DR:239,68,68}
body{background:#020912}
.sb{--SB:linear-gradient(180deg,#EF44440A,#020912)}
.ni.on{color:#EF4444;background:rgba(239,68,68,.13)}
.ni.on::after{background:#EF4444}
.ni:hover{color:#FCA5A5}
.tb-ttl{color:#EF4444!important}
.clk .ct{color:#EF4444!important}
.hero{background:linear-gradient(135deg,#EF444408,#020912)}
.ld .d{color:#EF4444;background:#EF4444}
.tr2:hover{background:rgba(239,68,68,.05)}

/* Mobile Menu Styles */
.menu-btn { display:none; background:none; border:none; color:var(--DC); font-size:24px; cursor:pointer; padding:0 10px; margin-right:10px; }
@media(max-width:768px){
  .sb { display:none; position:fixed; top:0; right:0; height:100vh; z-index:2000; box-shadow:-5px 0 25px rgba(0,0,0,0.8); }
  .sb.show { display:flex; }
  .menu-btn { display:block!important; }
}
</style>
</head>
<body>
<div class="shell">
<aside class="sb" id="sidebar">
  <div class="sb-brand">
    <div id="lgEl"></div>
    <div><div class="sb-t1" style="color:#EF4444">se</div><div class="sb-t2" id="divTitleEn">Tech Alerts</div></div>
  </div>
  <div id="ubEl" class="ub"></div>
  <nav class="nav" id="navEl"></nav>
  <div class="sb-foot">
    <button class="btn-lo" onclick="doLogout()">🚪 <span class="tl" data-en="Sign Out" data-ar="خروج">Sign Out</span></button>
    <button class="btn-lg" onclick="openLangPicker()" title="Language / اللغة">🌐</button>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('show')">☰</button>
      <div class="tb-ttl fhud" id="pgtitle">Dashboard</div>
    </div>
    <div class="tb-r">
      <div class="clk"><div class="ct" id="ct"></div><div id="cd" style="font-family:var(--mono);font-size:9.5px;color:var(--t3)"></div></div>
      <button class="nbtn" onclick="toast(t2('لا إشعارات جديدة','No new notifications'),'i')">🔔<span class="ndot" id="ndot" style="display:none"></span></button>
      <div class="ld"><div class="d"></div><span style="color:#EF444444;font-family:var(--mono);font-size:11px">LIVE</span></div>
    </div>
  </div>
  <div class="page" id="pgContent"></div>
</div>
</div>
<div id="tc"></div>
<script src="lang.js?v=7"></script>
<script src="app.js?v=7"></script>
<script>
const BL = 'technical_alerts';
const DC = '#EF4444';
const DR = '239,68,68';
const NAV = [
  {k:'dash',   ar:'لوحة المتابعة',       en:'Dashboard',     ic:'⚠️', fn:"go('dash')"},
  {k:'daily',  ar:'يوم العمل',            en:'My Day',        ic:'☀️', fn:"go('daily')"},
  {g:'المهام',ge:'TASKS'},
  {k:'tasks',  ar:'المهام',               en:'Tasks',         ic:'✓',  fn:"go('tasks')"},
  {k:'ntask',  ar:'مهمة جديدة',           en:'New Task',      ic:'➕', fn:"go('ntask')"},
  {g:'التحسين',ge:'IMPROVEMENT'},
  {k:'afis',   ar:'نقاط التحسين',         en:'AFIs',          ic:'▲',  fn:"go('afis')"},
  {k:'kpis',   ar:'مؤشرات الأداء',        en:'KPIs',          ic:'📈', fn:"go('kpis')"},
  {k:'assess', ar:'التقييمات',            en:'Assessments',   ic:'▤',  fn:"go('assess')"},
  {g:'الفريق',ge:'TEAM'},
  {k:'team',   ar:'الفريق',               en:'Team',          ic:'👥', fn:"go('team')"},
  {k:'reviews', ar:'مراجعة الإنجازات',    en:'Review Completions', ic:'✅', fn:"go('reviews')"},
  {g:'متابعة',ge:'TRACKING'},
  {k:'alerts', ar:'التنبيهات',            en:'Alerts',        ic:'⚠️', fn:"go('alerts')"},
  {k:'weekly', ar:'التحديث الأسبوعي',    en:'Weekly Update', ic:'📊', fn:"go('weekly')"},
];
const PAGES = {};
function reg(k,fn){PAGES[k]=fn;}

function go(k){
  document.getElementById('sidebar').classList.remove('show');
  const item=NAV.find(n=>n.k===k);
  document.getElementById('pgtitle').textContent=item?t2(item.ar,item.en):k;
  buildNav(NAV,k);
  const ct=document.getElementById('pgContent');
  ct.innerHTML='<div class="fade" id="pg"></div>';
  const fn=PAGES[k];
  if(fn)fn(document.getElementById('pg'));
  else document.getElementById('pg').innerHTML=`<p style="padding:40px;color:var(--t3)">${t2('قيد البناء…', 'Coming soon...')}</p>`;
  window.scrollTo(0,0);
}

/* ═══ TEAM + CREATE EMPLOYEE ═══════════════════════════════ */
reg('team',async el=>{
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h1 style="font-family:var(--hud);font-size:19px;color:${DC}">👥 ${t2('فريق التنبيهات الفنية', 'Tech Alerts Team')}</h1>
      <button class="btn p" onclick="openCreateEmp()" style="background:linear-gradient(135deg,${DC},${DC}99);border:none">+ ${t2('إضافة موظف', 'Add Employee')}</button>
    </div>
    <div class="g3" id="tGrid">${skR(3)}</div>`;
  const{data}=await dbList('profiles',{eq:{division:BL}}).catch(()=>({data:[]}));
  document.getElementById('tGrid').innerHTML=data.length?data.map(m=>{
    const init=(m.full_name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return`<div class="card" style="border-color:rgba(${DR},.2);text-align:center;padding:18px">
      <div style="width:48px;height:48px;border-radius:12px;background:rgba(${DR},.18);border:1px solid rgba(${DR},.35);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;margin:0 auto 10px;color:${DC}">${init}</div>
      <div style="font-weight:700;font-size:13.5px">${esc(App.lang==='ar'?m.full_name:m.full_name_en||m.full_name)}</div>
      <div style="font-size:11px;color:var(--t2);font-family:var(--mono);margin-top:3px">${esc(m.job_title||tl(m.role)||'')}</div>
      <button class="btn sm p" style="width:100%;margin-top:10px;background:linear-gradient(135deg,${DC}44,${DC}22);border:1px solid ${DC}44;color:${DC}" onclick="go('ntask')">+ ${t2('مهمة', 'Task')}</button>
    </div>`;
  }).join(''):emptyEl(t2('لا أعضاء', 'No team members'));
});

window.openCreateEmp = () => {
  openModal(`<div class="mh"><h3 style="color:${DC}">👤 ${t2('إنشاء موظف جديد', 'Create New Employee')}</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <div class="field ff"><label>${t2('الاسم الكامل *', 'Full Name *')}</label><input id="ce_name" placeholder="..."></div>
      <div class="field">
        <label>${t2('الرقم الوظيفي *', 'Employee ID *')}</label>
        <div style="display:flex;gap:7px">
          <input type="text" id="ce_empid" placeholder="12345" style="direction:ltr;text-align:right;flex:1">
          <button class="btn sm" onclick="genEmpId()">🔀 ${t2('توليد', 'Gen')}</button>
        </div>
      </div>
      <div class="field">
        <label>${t2('كلمة المرور المؤقتة *', 'Temp Password *')}</label>
        <div style="display:flex;gap:7px">
          <input type="text" id="ce_pw" placeholder="...">
          <button class="btn sm" onclick="genEmpPW()">🔀 ${t2('توليد', 'Gen')}</button>
        </div>
      </div>
      <div class="field"><label>${t2('المسمى الوظيفي', 'Job Title')}</label><input id="ce_title" placeholder="..."></div>
    </div>
    <div class="mf">
      <button class="btn" onclick="closeModal()">${t2('إلغاء', 'Cancel')}</button>
      <button class="btn p" id="ceBtn" onclick="doCreateEmp()" style="background:linear-gradient(135deg,${DC},${DC}99);border:none">${t2('إنشاء الحساب', 'Create Account')}</button>
    </div>`);
  genEmpPW();
};
window.genEmpId = () => { const el = document.getElementById('ce_empid'); if(el) el.value = Math.floor(10000 + Math.random()*90000).toString(); };
window.genEmpPW = () => {
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789@#$!'; let p='';
  for(let i=0;i<10;i++) p+=ch[Math.floor(Math.random()*ch.length)];
  const el=document.getElementById('ce_pw'); if(el) el.value=p;
};
window.doCreateEmp = async () => {
  const name = mv('ce_name'), empId = mv('ce_empid'), pass = mv('ce_pw');
  if(!name||!empId||!pass){toast(t2('يرجى تعبئة الحقول المطلوبة', 'Please fill all fields'),'e');return;}
  const btn = document.getElementById('ceBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  const sess = getStoredSession();
  try{
    const authRes = await fetch(SB_URL+'/auth/v1/signup',{
      method:'POST', headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email:empId+'@se.local', password:pass, data:{full_name:name,role:'employee',division:BL}})
    });
    const authData = await authRes.json();
    if(authData.error){ toast('Error: '+authData.error_description,'e'); if(btn){btn.disabled=false;btn.innerHTML=t2('إنشاء الحساب', 'Create Account');} return; }
    
    const uid = authData.id||authData.user?.id;
    if(uid){
      await fetch(SB_URL+'/rest/v1/profiles?on_conflict=id',{
        method:'POST', headers:{'apikey':SB_KEY,'Authorization':'Bearer '+(sess?.access_token||''),'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
        body:JSON.stringify({id:uid, full_name:name, role:'employee', username:empId, division:BL, employee_id:empId, job_title:mv('ce_title')||null, is_active:true})
      });
    }
    closeModal(); go('team'); toast(t2('تم إنشاء الحساب ✓', 'Account created ✓'), 's');
  }catch(e){ toast('Error: '+e.message,'e'); if(btn){btn.disabled=false;btn.innerHTML=t2('إنشاء الحساب', 'Create Account');} }
};

/* ═══ DASHBOARD ════════════════════════════════════════════ */
reg('dash',async el=>{
  el.innerHTML=`
    <div class="hero mb2">
      <canvas class="hcv" id="hcv"></canvas>
      <div class="hi">
        <h1>📡 ${t2('الرادار الفني — Early Warning System', 'Technical Radar — Early Warning System')}</h1>
        <div class="hs">"${t2('رصد التنبيهات الفنية عبر قطاعات التوليد والنقل والتوزيع · تصنيف وتصعيد', 'Monitoring tech alerts across Gen, Grid & Dist · Triage & Escalation')}"</div>
        <div class="hks" id="hks"></div>
      </div>
      <div class="hb"></div>
    </div>
    <div class="g4 mb2" id="s4">${skR()}</div>
    <div class="g21 mb2">
      <div class="panel">
        <div class="ph" style="border-color:rgba(${DR},.12)"><h3 style="color:${DC}">▲ ${t2('نقاط التحسين المفتوحة','Open AFIs')}</h3><button class="btn sm" onclick="go('afis')">${t2('عرض الكل', 'View All')}</button></div>
        <div id="afiPnl">${skR()}</div>
      </div>
      <div>
        <div class="panel mb2">
          <div class="ph" style="border-color:rgba(${DR},.12)"><h3 style="color:${DC}">⚠️ ${t2('التنبيهات', 'Alerts')}</h3></div>
          <div id="alrPnl">${skR(3)}</div>
        </div>
      </div>
    </div>`;

  initCanvas('hcv','radar','#EF4444');

  try{
    const[afiO,afiL,alrO,tskO,afis,alrs]=await Promise.all([
      dbCnt('afis',{eq:{business_line:BL},neq:{status:'closed'}}),
      dbCnt('afis',{eq:{business_line:BL,status:'overdue'}}),
      dbCnt('technical_alerts',{eq:{source_division:BL},neq:{status:'resolved'}}),
      dbCnt('tasks',{eq:{division:BL},neq:{status:'closed'}}),
      dbList('afis',{eq:{business_line:BL},neq:{status:'closed'},lim:6}),
      dbList('technical_alerts',{eq:{source_division:BL},neq:{status:'resolved'},lim:4}),
    ]);

    document.getElementById('hks').innerHTML=[
      {v:afiO,l:'AFIs',cl:''},{v:afiL,l:'OVERDUE',cl:afiL>0?'rd':'gn'},
      {v:tskO,l:'TASKS',cl:''},{v:alrO,l:'ALERTS',cl:alrO>0?'yw':''}
    ].map(k=>`<div class="hk ${k.cl}"><div class="hv">${k.v}</div><div class="hl">${k.l}</div></div>`).join('');

    document.getElementById('s4').innerHTML=[
      {sl:t2('AFIs مفتوحة','Open AFIs'),sv:afiO,cl:afiO>5?'red':''},
      {sl:t2('AFIs متأخرة','Overdue AFIs'),sv:afiL,cl:afiL?'red':'grn'},
      {sl:t2('تنبيهات فنية', 'Tech Alerts'),sv:alrO,cl:alrO?'ylw':'grn'},
      {sl:t2('مهام نشطة','Active Tasks'),sv:tskO,cl:''},
    ].map(s=>`<div class="sc"><div class="sl">${s.sl}</div><div class="sv ${s.cl}">${s.sv}</div></div>`).join('');

    document.getElementById('afiPnl').innerHTML=afis.data.length
      ?afis.data.map(a=>`<div class="dr ptr" onclick="go('afis')">
          <div class="dd" style="background:${a.status==='overdue'?'var(--danger)':a.priority==='critical'?'var(--warning)':DC}"></div>
          <div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(a.title)}</div>
          <div style="font-size:11.5px;color:var(--t2)">${a.afi_number||''} · ${fmtD(a.due_date)}</div></div>
          ${priBadge(a.priority)} ${stBadge(a.status)}
        </div>`).join('')
      :emptyEl(t2('لا AFIs مفتوحة','No Open AFIs'));

    document.getElementById('alrPnl').innerHTML=alrs.data.length
      ?alrs.data.map(a=>`<div class="dr">
          <div class="dd" style="background:${a.severity==='critical'?'var(--danger)':'var(--warning)'}"></div>
          <div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(a.title)}</div></div>
          <span class="badge ${a.severity==='critical'?'br':'by'}">${t2(a.severity==='critical'?'حرج':'عالٍ', a.severity)}</span>
        </div>`).join('')
      :`<div style="padding:12px;text-align:center;color:var(--success);font-size:13px">✓ ${t2('لا تنبيهات', 'No alerts')}</div>`;

  }catch(e){toast(e.message,'e');}
});

reg('daily',el=>{
  el.innerHTML=`<div class="hero mb2"><div class="hi"><h1>☀️ ${t2('يوم العمل', 'My Day')}</h1></div></div>
    <div class="panel"><div class="ph"><h3>📝 ${t2('تحديث نهاية اليوم', 'Daily Update')}</h3></div>
    <div class="pb"><div class="field"><label>${t2('ماذا أنجزنا اليوم؟', 'What was done?')}</label><textarea id="d_done" rows="3"></textarea></div>
    <button class="btn p" onclick="toast(t2('تم', 'Done'), 's')">📤 ${t2('حفظ التحديث', 'Save Update')}</button></div></div>`;
});

reg('tasks',async el=>{
  el.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:14px"><h1 style="color:${DC}">✓ ${t2('إدارة المهام', 'Task Management')}</h1><button class="btn p" onclick="go('ntask')">+ ${t2('مهمة جديدة', 'New Task')}</button></div><div class="panel"><div id="taskList">${skR()}</div></div>`;
  const{data}=await dbList('tasks',{eq:{division:BL}});
  document.getElementById('taskList').innerHTML=data.length?data.map(tk=>`<div class="tr2"><div style="flex:1"><div class="tt">${esc(tk.title)}</div></div>${stBadge(tk.status)}</div>`).join(''):emptyEl(t2('لا مهام', 'No tasks'));
});

reg('ntask',async el=>{
  const{data:team}=await dbList('profiles',{eq:{division:BL}}).catch(()=>({data:[]}));
  el.innerHTML=`<h1 style="color:${DC};margin-bottom:14px">➕ ${t2('مهمة جديدة', 'New Task')}</h1>
    <div class="panel pb">
      <div class="field"><label>${t2('عنوان المهمة *', 'Task Title *')}</label><input id="nt_t"></div>
      <div class="field"><label>${t2('الوصف التفصيلي', 'Detailed Description')}</label><textarea id="nt_d" rows="3"></textarea></div>
      <div class="field"><label>${t2('مكلّف إلى *', 'Assign To *')}</label><select id="nt_a"><option value="">${t2('اختر...', 'Select...')}</option>${team.map(m=>`<option value="${m.id}">${esc(m.full_name)}</option>`).join('')}</select></div>
      <button class="btn p" onclick="toast(t2('تم','Done'),'s');go('tasks')">${t2('إنشاء المهمة', 'Create Task')}</button>
    </div>`;
});

['afis','kpis','assess','reviews','alerts','weekly'].forEach(k=>reg(k,el=>{
  el.innerHTML=`<h1 style="color:${DC};margin-bottom:14px">${NAV.find(n=>n.k===k)?.ar||k}</h1><div class="panel pb"><p style="color:var(--t2)">${t2('قيد التطوير...', 'Under development...')}</p></div>`;
}));

(async()=>{
  const p=await initPage({roles:['technical_alerts_manager','admin','director','governance_manager']});
  if(!p)return;
  document.getElementById('lgEl').innerHTML=LOGO;
  document.getElementById('divTitleEn').textContent = t2('التنبيهات الفنية', 'Technical Alerts');
  buildNav(NAV,'dash');go('dash');
})();
</script>
</body>
</html>


```
