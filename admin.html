<!DOCTYPE html>
<html lang="en" dir="ltr" id="root">
<head>
<meta charset="UTF-8">
<script>document.documentElement.lang="en";document.documentElement.dir="ltr";</script>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SE · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:#020912;color:#E8F0FF;font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
button,input,select{font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#060F1E}::-webkit-scrollbar-thumb{background:#1E3A56;border-radius:2px}
.shell{display:flex;height:100vh;overflow:hidden}
.sb{width:240px;flex-shrink:0;background:linear-gradient(180deg,#091628,#060F1E);border-left:1px solid #152840;display:flex;flex-direction:column;transition:.3s}
.sb-brand{padding:14px 12px;border-bottom:1px solid #152840;display:flex;align-items:center;gap:8px}
.sb-t1{font-family:'Chakra Petch',monospace;font-size:14px;font-weight:700;color:#4F46E5}
.sb-t2{font-size:10px;color:#3E5878}
.ub{margin:8px;padding:8px;background:#0C1E38;border:1px solid #152840;border-radius:8px;display:flex;align-items:center;gap:8px}
.ub-av{width:30px;height:30px;border-radius:7px;background:rgba(79,70,229,.2);color:#818CF8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ub-nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ub-rl{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#8098BC}
.odot{width:7px;height:7px;border-radius:50%;background:#10B981;box-shadow:0 0 5px #10B981;margin-right:auto;flex-shrink:0}
.nav{flex:1;overflow-y:auto;padding:5px 0}
.ng{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#3E5878;letter-spacing:.14em;padding:8px 12px 3px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:8px;padding:7px 12px;color:#8098BC;font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:right;transition:.12s;border-radius:0}
.ni:hover{color:#E8F0FF;background:#0C1E38}
.ni.on{color:#818CF8;background:rgba(79,70,229,.12)}
.ni .ic{width:18px;text-align:center;font-size:13px}
.sb-foot{padding:8px;border-top:1px solid #152840;display:flex;gap:5px}
.btn-lo{flex:1;padding:7px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#EF4444;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
.btn-lg{padding:7px 10px;background:#0C1E38;border:1px solid #152840;color:#8098BC;border-radius:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:52px;background:rgba(6,15,30,.97);border-bottom:1px solid #152840;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.tb-ttl{font-family:'Chakra Petch',monospace;font-size:14px;font-weight:600;color:#818CF8}
.tb-r{display:flex;align-items:center;gap:10px}
.clk-t{font-family:'Chakra Petch',monospace;font-size:13px;color:#4F46E5}
.clk-d{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#3E5878}
.adot{display:flex;align-items:center;gap:5px}
.adot .d{width:7px;height:7px;border-radius:50%;background:#4F46E5;box-shadow:0 0 5px #4F46E5;animation:pd 2s infinite}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.4}}
.page{flex:1;overflow-y:auto;padding:16px}
/* Cards */
.sc{background:linear-gradient(145deg,#0C1E38,#091628);border:1px solid #152840;border-radius:10px;padding:14px;position:relative;overflow:hidden;transition:.18s}
.sc:hover{transform:translateY(-2px)}
.sc::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:radial-gradient(circle at 100% 0%,#4F46E5 0%,transparent 75%);opacity:.08}
.sc .sl{font-size:11.5px;color:#8098BC;margin-bottom:8px}
.sc .sv{font-family:'Chakra Petch',monospace;font-size:28px;font-weight:700;background:linear-gradient(135deg,#4F46E5,#818CF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sc .sv.grn{background:linear-gradient(135deg,#10B981,#34D399)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:600;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.bg{background:rgba(21,40,64,.8);border:1px solid #152840;color:#8098BC}
/* Panel */
.panel{background:#091628;border:1px solid #152840;border-radius:10px;overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #152840}
.ph h3{font-family:'Chakra Petch',monospace;font-size:12.5px;font-weight:600;color:#818CF8}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #152840;background:#0C1E38;color:#E8F0FF;white-space:nowrap;transition:.14s}
.btn:hover{background:#1E3A56}
.btn.p{background:linear-gradient(135deg,#4F46E5,#818CF8);border-color:#4F46E5;color:#fff}
.btn.p:hover{filter:brightness(1.1)}
.btn.d{background:transparent;border-color:rgba(239,68,68,.35);color:#EF4444}
.btn.sm{padding:4px 11px;font-size:11.5px}
/* User row */
.ur{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(79,70,229,.07);transition:.13s}
.ur:hover{background:rgba(79,70,229,.04)}
.ur:last-child{border-bottom:none}
.ur-av{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
/* Form */
.field{margin-bottom:12px}
.field label{display:block;font-size:11.5px;color:#8098BC;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:#060F1E;border:1px solid #152840;color:#E8F0FF;border-radius:7px;padding:8px 11px;font-size:13.5px;font-family:'IBM Plex Sans Arabic',sans-serif;transition:.14s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#4F46E5}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ff{grid-column:1/-1}
/* Modal */
.mbg{position:fixed;inset:0;background:rgba(2,9,18,.88);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px;overflow-y:auto}
.modal{background:#091628;border:1px solid #152840;border-radius:12px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.8);animation:mani .2s ease}
@keyframes mani{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal.w{max-width:720px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #152840;position:sticky;top:0;background:#091628;z-index:1}
.mh h3{font-family:'Chakra Petch',monospace;font-size:14px;font-weight:600;color:#818CF8}
.mx{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:#8098BC;font-size:17px;cursor:pointer;transition:.12s;border:none;background:none}
.mx:hover{background:rgba(239,68,68,.15);color:#EF4444}
.mbd{padding:16px 18px}
.mf{padding:11px 18px;border-top:1px solid #152840;display:flex;justify-content:flex-end;gap:7px;background:#091628;position:sticky;bottom:0}
/* Creds */
.creds{background:#070F1D;border:1px solid rgba(79,70,229,.25);border-radius:8px;padding:14px;font-family:'IBM Plex Mono',monospace}
.cl{font-size:9.5px;color:#3E5878;letter-spacing:.06em;margin-bottom:3px;margin-top:8px}
.cv{font-size:13px;font-weight:700;color:#818CF8;background:#0A1828;padding:6px 10px;border-radius:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;word-break:break-all}
.cpbtn{padding:2px 8px;border-radius:5px;background:rgba(79,70,229,.2);border:1px solid rgba(79,70,229,.3);color:#818CF8;cursor:pointer;font-size:10px;white-space:nowrap;flex-shrink:0;font-family:'IBM Plex Mono',monospace}
/* Toast */
#tc{position:fixed;bottom:18px;right:18px;z-index:500;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:10px;border:1px solid;font-size:13px;font-weight:500;min-width:240px;max-width:340px;pointer-events:all;animation:tin .25s ease;box-shadow:0 8px 24px rgba(0,0,0,.5)}
@keyframes tin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.ts{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:#10B981}
.te{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#EF4444}
.ti{background:rgba(79,70,229,.1);border-color:rgba(79,70,229,.3);color:#818CF8}
/* Spin */
.spin{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
/* Note */
.note{background:rgba(79,70,229,.08);border:1px solid rgba(79,70,229,.2);border-radius:8px;padding:10px 12px;font-size:12.5px;color:#818CF8;margin-bottom:14px;line-height:1.6}
/* Filters */
.fi{background:#060F1E;border:1px solid #152840;border-radius:8px;padding:7px 11px;font-size:13px;color:#E8F0FF;transition:.13s;font-family:'IBM Plex Sans Arabic',sans-serif}
.fi:focus{outline:none;border-color:#4F46E5}
/* skr */
.skr{height:42px;border-radius:8px;background:linear-gradient(90deg,#0C1E38 25%,#091628 50%,#0C1E38 75%);background-size:400% 100%;animation:sh 1.4s ease infinite;margin-bottom:7px}
@keyframes sh{0%{background-position:100% 50%}100%{background-position:0 50%}}

/* 📱 Mobile Menu Styles */
.menu-btn { display:none; background:none; border:none; color:#818CF8; font-size:24px; cursor:pointer; padding:0 10px; }
@media(max-width:768px){
  .sb { display:none; position:fixed; top:0; right:0; height:100vh; z-index:2000; box-shadow:-5px 0 25px rgba(0,0,0,0.8); }
  .sb.show { display:flex; }
  .menu-btn { display:block!important; }
  .page { padding:12px; }
  .g4 { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>
<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sb" id="sidebar">
    <div class="sb-brand">
      <img src="se-logo.png.PNG" alt="SE" style="height:28px;width:auto;object-fit:contain" onerror="this.style.display='none'">
      <div><div class="sb-t1">se</div><div class="sb-t2">System Admin</div></div>
    </div>
    <div class="ub" id="ubEl">
      <div class="ub-av" id="ubAv">—</div>
      <div style="flex:1;min-width:0"><div class="ub-nm" id="ubNm">...</div><div class="ub-rl">Admin</div></div>
      <div class="odot"></div>
    </div>
    <nav class="nav">
      <div class="ng" id="n_admin">الإدارة</div>
      <button class="ni on" onclick="showPage('users')" id="b_users"><span class="ic">👥</span> إدارة المستخدمين</button>
      <button class="ni" onclick="showPage('divs')" id="b_divs"><span class="ic">🏛️</span> الدوائر</button>
      <div class="ng" id="n_settings">الإعدادات</div>
      <button class="ni" onclick="showPage('settings')" id="b_settings"><span class="ic">⚙️</span> الإعدادات</button>
      <button class="ni" onclick="showPage('health')" id="b_health"><span class="ic">💡</span> صحة النظام</button>
    </nav>
    <div class="sb-foot">
      <button class="btn-lo" onclick="doLogout()" id="b_logout">🚪 خروج</button>
      <button class="btn-lg" onclick="toggleLang()" id="b_lang">🌐</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('show')">☰</button>
        <div class="tb-ttl" id="pgTitle">إدارة المستخدمين</div>
      </div>
      <div class="tb-r">
        <div><div class="clk-t" id="ct">—</div><div class="clk-d" id="cd"></div></div>
        <div class="adot"><div class="d"></div><span style="color:#3E5878;font-family:'IBM Plex Mono',monospace;font-size:11px">ADMIN</span></div>
      </div>
    </div>
    <div class="page" id="pageArea">
      <div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px">
        <div class="spin" style="width:36px;height:36px;border-width:3px;color:#4F46E5"></div>
        <div style="color:#8098BC;font-size:13px" id="loadTxt">...</div>
      </div>
    </div>
  </div>
</div>
<div id="tc"></div>

<script src="lang.js"></script>
<script src="app.js"></script>
<script>
window._currentPage = 'users';

/* ═══ API CALL — pure fetch, no Supabase JS ═════════════════ */
async function api(method, path, body, token) {
  const sess = getStoredSession();
  const tk = token || sess?.access_token || '';
  const res = await fetch(SB_URL + path, {
    method: method || 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + tk,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  const text = await res.text();
  try { return JSON.parse(text); } catch(e) { return text; }
}

/* ═══ PAGE NAVIGATION ════════════════════════════════════════ */
function showPage(name){
  window._currentPage = name;
  document.getElementById('sidebar').classList.remove('show');
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('on'));
  document.getElementById('b_'+name)?.classList.add('on');
  
  const titles = {
    users: t2('إدارة المستخدمين', 'User Management'),
    divs: t2('الدوائر', 'Divisions'),
    settings: t2('الإعدادات', 'Settings'),
    health: t2('صحة النظام', 'System Health')
  };
  document.getElementById('pgTitle').textContent = titles[name] || name;
  
  const area=document.getElementById('pageArea');
  area.innerHTML='<div class="skr"></div><div class="skr"></div><div class="skr"></div>';
  
  if(name==='users') renderUsers();
  else if(name==='divs') renderDivs();
  else if(name==='settings') renderSettings();
  else if(name==='health') renderHealth();
}

/* ═══ TRANSLATE NAV ══════════════════════════════════════════ */
function translateAdminNav() {
  document.getElementById('n_admin').textContent = t2('الإدارة', 'Administration');
  document.getElementById('n_settings').textContent = t2('الإعدادات', 'Settings');
  document.getElementById('b_users').innerHTML = `<span class="ic">👥</span> ${t2('إدارة المستخدمين', 'Users')}`;
  document.getElementById('b_divs').innerHTML = `<span class="ic">🏛️</span> ${t2('الدوائر', 'Divisions')}`;
  document.getElementById('b_settings').innerHTML = `<span class="ic">⚙️</span> ${t2('الإعدادات', 'Settings')}`;
  document.getElementById('b_health').innerHTML = `<span class="ic">💡</span> ${t2('صحة النظام', 'Health')}`;
  document.getElementById('b_logout').textContent = `🚪 ${t2('خروج', 'Sign Out')}`;
}

/* ═══ USERS PAGE ════════════════════════════════════════════ */
async function renderUsers(){
  const area=document.getElementById('pageArea');
  area.innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">'+
      `<div><h1 style="font-family:'Chakra Petch',monospace;font-size:18px;color:#818CF8">👥 ${t2('إدارة المستخدمين', 'User Management')}</h1>`+
      `<div style="font-size:12px;color:#8098BC">${t2('أنشئ الحسابات واضبط الأدوار والدوائر', 'Create accounts, set roles and divisions')}</div></div>`+
      `<button class="btn p" onclick="openCU()">+ ${t2('إنشاء مستخدم', 'Create User')}</button>`+
    '</div>'+
    `<div class="note">ℹ️ ${t2('أنشئ المستخدم ← تظهر بيانات الدخول ← أعطها للمستخدم ← يسجّل دخول ويغيّر كلمة المرور', 'Create user → Get credentials → Give to user → They login & change password')}</div>`+
    '<div class="g4" style="margin-bottom:14px">'+
      `<div class="sc"><div class="sl">${t2('الكل', 'All')}</div><div class="sv" id="stAll">—</div></div>`+
      `<div class="sc"><div class="sl">${t2('مدراء', 'Managers')}</div><div class="sv" id="stMgr">—</div></div>`+
      `<div class="sc"><div class="sl">${t2('موظفون', 'Employees')}</div><div class="sv" id="stEmp">—</div></div>`+
      `<div class="sc"><div class="sl">${t2('نشطون', 'Active')}</div><div class="sv grn" id="stAct">—</div></div>`+
    '</div>'+
    '<div class="panel">'+
      '<div style="padding:10px 12px;border-bottom:1px solid #152840;display:flex;gap:8px;flex-wrap:wrap">'+
        `<input class="fi" id="uq" placeholder="${t2('بحث...', 'Search...')}" style="min-width:140px">`+
        '<select class="fi" id="ur">'+
          `<option value="">${t2('كل الأدوار', 'All Roles')}</option>`+
          Object.entries(ROLE_AR).map(e => `<option value="${e[0]}">${t2(e[1], e[0])}</option>`).join('')+
        '</select>'+
        '<button class="btn sm" onclick="loadUsers()">🔄</button>'+
      '</div>'+
      '<div id="uList"><div class="skr" style="margin:10px"></div><div class="skr" style="margin:10px"></div></div>'+
    '</div>';
  document.getElementById('uq').addEventListener('input',function(){clearTimeout(window._ut);window._ut=setTimeout(loadUsers,300);});
  document.getElementById('ur').addEventListener('change',loadUsers);
  loadUsers();
}

async function loadUsers(){
  const el=document.getElementById('uList');
  if(!el) return;
  el.innerHTML=`<div style="padding:14px;text-align:center;color:#8098BC">${t2('جارٍ التحميل...', 'Loading...')}</div>`;
  const q=(document.getElementById('uq')?.value||'').toLowerCase();
  const r=document.getElementById('ur')?.value||'';
  let url='/rest/v1/profiles?select=*&order=created_at.desc';
  if(r) url+='&role=eq.'+encodeURIComponent(r);
  try{
    const data=await api('GET',url);
    if(!Array.isArray(data)) throw new Error(typeof data==='object'?JSON.stringify(data):String(data));
    const fl=q?data.filter(function(u){return ((u.full_name||'')+(u.full_name_en||'')).toLowerCase().indexOf(q)>-1;}):data;
    
    document.getElementById('stAll')&&(document.getElementById('stAll').textContent=fl.length);
    document.getElementById('stMgr')&&(document.getElementById('stMgr').textContent=fl.filter(u=>u.role&&(u.role.includes('manager')||u.role==='director')).length);
    document.getElementById('stEmp')&&(document.getElementById('stEmp').textContent=fl.filter(u=>u.role==='employee').length);
    document.getElementById('stAct')&&(document.getElementById('stAct').textContent=fl.filter(u=>u.is_active).length);
    
    if(!fl.length){el.innerHTML=`<div style="padding:40px;text-align:center;color:#8098BC">${t2('لا مستخدمين', 'No users')} — <button class="btn sm p" onclick="openCU()">+ ${t2('إنشاء أول مستخدم', 'Create first user')}</button></div>`;return;}
    
    el.innerHTML=fl.map(function(u){
      const init=(u.full_name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const ROLE_COLORS = {admin:'#FCA5A5',director:'#FDE68A',governance_manager:'#C4B5FD',generation_manager:'#FDE68A',national_grid_manager:'#BAE6FD',distribution_manager:'#A7F3D0',technical_alerts_manager:'#FCA5A5',employee:'#8098BC'};
      const ROLE_BGS = {admin:'rgba(239,68,68,.15)',director:'rgba(212,175,55,.12)',governance_manager:'rgba(124,58,237,.15)',generation_manager:'rgba(245,158,11,.12)',national_grid_manager:'rgba(14,165,233,.12)',distribution_manager:'rgba(16,185,129,.12)',technical_alerts_manager:'rgba(239,68,68,.12)',employee:'rgba(30,58,88,.5)'};
      const clr=ROLE_COLORS[u.role]||'#8098BC';
      const bg=ROLE_BGS[u.role]||'rgba(30,58,88,.5)';
      const roleName = t2(ROLE_AR[u.role]||u.role, u.role);
      const divName = u.division ? t2(DIVS[u.division]?.ar || u.division, DIVS[u.division]?.en || u.division) : '';
      
      return `<div class="ur">
        <div class="ur-av" style="background:${bg};color:${clr}">${init}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${esc(App.lang==='ar'?u.full_name:u.full_name_en||u.full_name||'—')}</div>
          <div style="font-size:10.5px;color:#8098BC;font-family:'IBM Plex Mono',monospace">${esc(u.username||u.employee_id||'—')}</div>

async function createUser(){
  const name=mv('nu_n'),email=mv('nu_em'),pass=mv('nu_pw'),role=mv('nu_rl');
  if(!name||!email||!pass||!role){toast(t2('يرجى تعبئة الحقول المطلوبة', 'Please fill all fields'),'e');return;}
  const btn=document.getElementById('createBtn');
  if(btn){btn.disabled=true;btn.innerHTML=`<span class="spin"></span> ${t2('جارٍ الإنشاء...', 'Creating...')}`;}
  try{
    const authRes=await fetch(SB_URL+'/auth/v1/signup',{
      method:'POST',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email:email,password:pass,data:{full_name:name,role:role}})
    });
    const authData=await authRes.json();
    if(authData.error||authData.msg){throw new Error(authData.error_description||authData.msg||authData.error||'Failed to create auth user');}
    const uid=authData.id||authData.user?.id;
    if(uid){
      const sess=getStoredSession();
      const tk=sess?.access_token||'';
      await fetch(SB_URL+'/rest/v1/profiles?id=eq.'+uid,{
        method:'PATCH',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+tk,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({full_name:name,full_name_en:mv('nu_ne')||null,role:role,division:mv('nu_dv')||null,job_title:mv('nu_tt')||null,job_title_en:mv('nu_te')||null,is_active:true})
      });
    }
    closeModal();
    showCreds(name,email,pass,ROLE_AR[role]||role);
    loadUsers();
  }catch(e){
    toast('Error: '+e.message,'e');
    if(btn){btn.disabled=false;btn.innerHTML=t2('إنشاء الحساب', 'Create Account');}
    if(e.message&&e.message.includes('already')){toast(t2('هذا الإيميل مسجّل مسبقاً', 'Email already exists'),'e');}
    else{closeModal();showManual(name,email,pass,role);}
  }
}

(async function init(){
  startClock();
  translateAdminNav();
  
  const sess = getStoredSession();
  if(!sess || !sess.access_token){ location.href='index.html'; return; }
  
  try{
    const payload = JSON.parse(atob(sess.access_token.split('.')[1]));
    if(payload.exp && payload.exp * 1000 < Date.now()){
      clearSession(); location.href='index.html'; return;
    }
  }catch(e){}
  
  document.getElementById('loadTxt').textContent='Fetching profile...';
  try{
    const data = await api('GET', '/rest/v1/profiles?id=eq.'+sess.user.id+'&select=*');
    const profile = Array.isArray(data) ? data[0] : null;
    
    if(!profile){
      document.getElementById('pageArea').innerHTML=
        `<div style="display:flex;align-items:center;justify-content:center;height:70vh">
        <div style="text-align:center;padding:20px">
          <div style="font-size:42px;margin-bottom:12px">🗄️</div>
          <h2 style="color:#fff;margin-bottom:8px">Profile not found</h2>
        </div></div>`;
      return;
    }
    
    if(profile.role !== 'admin'){
      const portals={admin:'admin.html',director:'department.html',governance_manager:'governance.html',generation_manager:'generation.html',national_grid_manager:'national-grid.html',distribution_manager:'distribution.html',technical_alerts_manager:'technical-alerts.html',employee:'employee.html'};
      location.href = portals[profile.role] || 'index.html';
      return;
    }
    
    // Set App.lang context for t2()
    App.lang = localStorage.getItem('se_lang_v2') || 'ar';
    document.documentElement.lang = App.lang;
    document.documentElement.dir = App.lang === 'ar' ? 'rtl' : 'ltr';
    translateAdminNav();

    const init=(profile.full_name||'A').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
    const av=document.getElementById('ubAv'),nm=document.getElementById('ubNm');
    if(av)av.textContent=init;
    if(nm)nm.textContent=App.lang==='ar'?profile.full_name:profile.full_name_en||profile.full_name||'Admin';
    
    showPage('users');
    
  }catch(e){
    document.getElementById('pageArea').innerHTML=
      `<div style="display:flex;align-items:center;justify-content:center;height:70vh">
      <div style="text-align:center;padding:20px">
        <div style="font-size:42px;margin-bottom:10px">⚠️</div>
        <div style="color:#EF4444;font-size:14px;margin-bottom:8px">${esc(e.message)}</div>
        <button onclick="location.reload()" class="btn p">${t2('إعادة المحاولة', 'Retry')}</button>
        <button onclick="doLogout()" class="btn" style="margin-right:8px">${t2('خروج', 'Sign Out')}</button>
      </div></div>`;
  }
})();
</script>
