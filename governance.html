<!DOCTYPE html>
<html lang="ar" dir="rtl" id="root">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SE · الحوكمة والتقييم</title>
<link rel="stylesheet" href="styles.css">
<style>
:root{--DC:#7C3AED;--DR:124,58,237}
body{background:#020912}
.sb{--SB:linear-gradient(180deg,#7C3AED0A,#020912)}
.ni.on{color:#7C3AED;background:rgba(124,58,237,.13)}
.ni.on::after{background:#7C3AED}
.ni:hover{color:#A78BFA}
.tb-ttl{color:#7C3AED!important}
.clk .ct{color:#7C3AED!important}
.hero{background:linear-gradient(135deg,#7C3AED08,#020912)}
.ld .d{color:#7C3AED;background:#7C3AED}
/* Task accent */
.tr2:hover{background:rgba(124,58,237,.05)}
.menu-btn{display:none}
</style>
</head>
<body>
<div class="shell">
<aside class="sb">
  <div class="sb-brand">
    <div id="lgEl"></div>
    <div><div class="sb-t1" style="color:#7C3AED">se</div><div class="sb-t2">الحوكمة والتقييم</div></div>
  </div>
  <div id="ubEl" class="ub"></div>
  <nav class="nav" id="navEl"></nav>
  <div class="sb-foot">
    <button class="btn-lo" onclick="doLogout()">🚪 خروج</button>
    <button class="btn-lg" onclick="toggleLang()">EN/ع</button>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="tb-ttl fhud" id="pgtitle">الحوكمة والتقييم</div>
    <div class="tb-r">
      <div class="clk"><div class="ct" id="ct"></div><div id="cd" style="font-family:var(--mono);font-size:9.5px;color:var(--t3)"></div></div>
      <button class="nbtn" onclick="openNotifs()">🔔<span class="ndot" id="ndot" style="display:none"></span></button>
      <div class="ld"><div class="d" style="color:#7C3AED;background:#7C3AED;box-shadow:0 0 6px #7C3AED"></div><span style="color:#7C3AED44;font-family:var(--mono);font-size:11px">LIVE</span></div>
    </div>
  </div>
  <div class="page" id="pgContent"></div>
</div>
</div>
<div id="tc"></div>
<script src="lang.js"></script>
<script src="app2.js"></script>
<script>
const BL = 'governance';
const DC = '#7C3AED';
const DR = '124,58,237';
const NAV = [
  {k:'dash',   ar:'لوحة المتابعة',       en:'Dashboard',     ic:'⚖️', fn:"go('dash')"},
  {k:'daily',  ar:'يوم العمل',            en:'My Day',        ic:'☀️', fn:"go('daily')"},
  {g:'المهام',ge:'TASKS'},
  {k:'tasks',  ar:'المهام',               en:'Tasks',         ic:'✓',  fn:"go('tasks')"},
  {k:'ntask',  ar:'مهمة جديدة',           en:'New Task',      ic:'➕', fn:"go('ntask')"},
  {g:'التحسين',ge:'IMPROVEMENT'},
  {k:'afis',   ar:'نقاط التحسين',         en:'AFIs',          ic:'▲',  fn:"go('afis')"},
  {k:'kpis',   ar:'مؤشرات الأداء',        en:'KPIs',          ic:'📈', fn:"go('kpis')"},
  {k:'assess', ar:'التقييمات',            en:'Assessments',   ic:'▤',  fn:"go('assess')"},
  {g:'الفريق',ge:'TEAM'},
  {k:'team',   ar:'الفريق',               en:'Team',          ic:'👥', fn:"go('team')"},
  {k:'tickets',ar:'التذاكر',              en:'Tickets',       ic:'🎫', fn:"go('tickets')"},
  {g:'متابعة',ge:'TRACKING'},
  {k:'alerts', ar:'التنبيهات',            en:'Alerts',        ic:'⚠️', fn:"go('alerts')"},
  {k:'meetings',ar:'الاجتماعات',en:'Meetings',ic:'📅',tlKey:'nav_meetings',fn:"go('meetings')"},
  {k:'weekly', ar:'التحديث الأسبوعي',    en:'Weekly Update', ic:'📊', fn:"go('weekly')"},
];
const PAGES = {};
function reg(k,fn){PAGES[k]=fn;}
let _cur='dash';

function go(k){
  _cur=k;
  const item=NAV.find(n=>n.k===k);
  document.getElementById('pgtitle').textContent=item?(App.lang==='ar'?item.ar:item.en):k;
  buildNav(NAV,k);
  const ct=document.getElementById('pgContent');
  ct.innerHTML='<div class="fade" id="pg"></div>';
  const fn=PAGES[k];
  if(fn)fn(document.getElementById('pg'));
  else document.getElementById('pg').innerHTML='<p style="padding:40px;color:var(--t3)">قيد البناء…</p>';
  window.scrollTo(0,0);
}

/* ═══ DASHBOARD ════════════════════════════════════════════ */
reg('dash',async el=>{
  el.innerHTML=`
    <div class="hero mb2">
      <canvas class="hcv" id="hcv"></canvas>
      <div class="hi">
        <h1>⚖️ دائرة الحوكمة والتقييم — المايسترو</h1>
        <div class="hs">"المشرف على منظومة التميز التشغيلي · الإطار · التقييم · المؤشرات · التحسين المستمر"</div>
        <div class="hks" id="hks">
          <div class="hk"><div class="hv">—</div><div class="hl">AFIs</div></div>
          <div class="hk rd"><div class="hv">—</div><div class="hl">OVERDUE</div></div>
          <div class="hk"><div class="hv">—</div><div class="hl">TASKS</div></div>
          <div class="hk yw"><div class="hv">—</div><div class="hl">ALERTS</div></div>
          <div class="hk"><div class="hv">—</div><div class="hl">ASSESS</div></div>
        </div>
      </div>
      <div class="hb"></div>
    </div>
    <div class="g4 mb2" id="s4">${skR()}</div>
    <div class="g21 mb2">
      <div class="panel">
        <div class="ph" style="border-color:rgba(${DR},.12)"><h3 style="color:${DC}">▲ نقاط التحسين المفتوحة</h3><button class="btn sm" onclick="go('afis')">عرض الكل</button></div>
        <div id="afiPnl">${skR()}</div>
      </div>
      <div>
        <div class="panel mb2">
          <div class="ph" style="border-color:rgba(${DR},.12)"><h3 style="color:${DC}">⚠️ التنبيهات</h3></div>
          <div id="alrPnl">${skR(3)}</div>
        </div>
        <div class="panel">
          <div class="ph" style="border-color:rgba(${DR},.12)"><h3 style="color:${DC}">▤ التقييمات</h3></div>
          <div id="asmPnl">${skR(2)}</div>
        </div>
      </div>
    </div>
    <div class="g2">
      <div class="panel">
        <div class="ph" style="border-color:rgba(${DR},.12)"><h3 style="color:${DC}">✓ آخر المهام</h3><button class="btn sm" onclick="go('tasks')">إدارة المهام</button></div>
        <div id="taskPnl">${skR(4)}</div>
      </div>
      <div class="panel">
        <div class="ph" style="border-color:rgba(${DR},.12)"><h3 style="color:${DC}">✦ مؤشرات الأداء</h3><button class="btn sm" onclick="go('kpis')">عرض الكل</button></div>
        <div id="kpiPnl">${skR(3)}</div>
      </div>
    </div>`;

  initCanvas('hcv','net','#7C3AED');

  try{
    const[afiO,afiL,alrO,asmO,tskO,afis,alrs,asms,tsks,kpis]=await Promise.all([
      dbCnt('afis',{eq:{business_line:BL},neq:{status:'closed'}}),
      dbCnt('afis',{eq:{business_line:BL,status:'overdue'}}),
      dbCnt('technical_alerts',{eq:{source_division:BL},neq:{status:'resolved'}}),
      dbCnt('assessments',{eq:{business_line:BL},neq:{stage:'closed'}}),
      dbCnt('tasks',{eq:{division:BL},neq:{status:'closed'}}),
      dbList('afis',{eq:{business_line:BL},neq:{status:'closed'},lim:6}),
      dbList('technical_alerts',{eq:{source_division:BL},neq:{status:'resolved'},lim:4}),
      dbList('assessments',{eq:{business_line:BL},neq:{stage:'closed'},lim:3}),
      dbList('tasks',{eq:{division:BL},neq:{status:'closed'},lim:5}),
      dbList('kpis',{eq:{business_line:BL},lim:4}),
    ]);

    if(_cur!=='dash')return;
    const _hk=document.getElementById('hks');if(!_hk)return;_hk.innerHTML=[
      {v:afiO,l:'AFIs',cl:''},{v:afiL,l:'OVERDUE',cl:afiL>0?'rd':'gn'},
      {v:tskO,l:'TASKS',cl:''},{v:alrO,l:'ALERTS',cl:alrO>0?'yw':''},
      {v:asmO,l:'ASSESS',cl:''},
    ].map(k=>`<div class="hk ${k.cl}"><div class="hv">${k.v}</div><div class="hl">${k.l}</div></div>`).join('');

    document.getElementById('s4').innerHTML=[
      {sl:'AFIs مفتوحة',sv:afiO,cl:afiO>5?'red':''},
      {sl:'AFIs متأخرة',sv:afiL,cl:afiL?'red':'grn'},
      {sl:'تنبيهات فنية',sv:alrO,cl:alrO?'ylw':'grn'},
      {sl:'مهام نشطة',sv:tskO,cl:''},
    ].map(s=>`<div class="sc"><div class="sl">${s.sl}</div><div class="sv ${s.cl}">${s.sv}</div></div>`).join('');

    document.getElementById('afiPnl').innerHTML=afis.data.length
      ?afis.data.map(a=>`<div class="dr ptr" onclick="go('afis')">
          <div class="dd" style="background:${a.status==='overdue'?'var(--danger)':a.priority==='critical'?'var(--warning)':DC}"></div>
          <div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(a.title)}</div>
          <div style="font-size:11.5px;color:var(--t2)">${a.afi_number||''} · ${fmtD(a.due_date)}</div></div>
          ${priBadge(a.priority)} ${stBadge(a.status)}
        </div>`).join('')
      :emptyEl('لا AFIs مفتوحة ✓');

    document.getElementById('alrPnl').innerHTML=alrs.data.length
      ?alrs.data.map(a=>`<div class="dr">
          <div class="dd" style="background:${a.severity==='critical'?'var(--danger)':'var(--warning)'}"></div>
          <div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(a.title)}</div></div>
          <span class="badge ${a.severity==='critical'?'br':'by'}">${a.severity==='critical'?'حرج':'عالٍ'}</span>
        </div>`).join('')
      :`<div style="padding:12px;text-align:center;color:var(--success);font-size:13px">✓ لا تنبيهات</div>`;

    document.getElementById('asmPnl').innerHTML=asms.data.length
      ?asms.data.map(a=>`<div class="dr"><div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(a.title)}</div></div>${stBadge(a.stage)}<div style="min-width:60px">${progBar(a.progress||0)}</div></div>`).join('')
      :emptyEl('لا تقييمات');

    document.getElementById('taskPnl').innerHTML=tsks.data.length
      ?tsks.data.map(tk=>`<div class="tr2" onclick="openTD('${tk.id}')">
          <div class="tck ${['closed','done'].includes(tk.status)?'done':''}">
            ${['closed','done'].includes(tk.status)?'✓':''}
          </div>
          <div style="flex:1">
            <div class="tt">${esc(tk.title)}</div>
            <div class="tm2">${priBadge(tk.priority)} <span style="color:${isOD(tk.due_date,tk.status)?'var(--danger)':'var(--t2)'}">${fmtD(tk.due_date)}</span> ${stBadge(tk.status)}</div>
          </div>
        </div>`).join('')
      :emptyEl('لا مهام نشطة');

    document.getElementById('kpiPnl').innerHTML=kpis.data.length
      ?kpis.data.map(k=>{
          const pct=k.target?Math.min(100,Math.round((k.actual||0)/k.target*100)):0;
          const clr=k.status==='green'?'var(--success)':k.status==='yellow'?'var(--warning)':'var(--danger)';
          return`<div class="dr ptr" onclick="go('kpis')">
            <div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(k.name_ar)}</div></div>
            <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:${clr}">${fmtN(k.actual)}${k.unit||'%'}</div>
            <div style="min-width:65px">${progBar(pct)}</div>
          </div>`;
        }).join('')
      :emptyEl('لا مؤشرات');
  }catch(e){toast(e.message,'e');}
});

/* ═══ MY DAY ════════════════════════════════════════════════ */
reg('daily',el=>{
  const h=new Date().getHours();
  el.innerHTML=`
    <div class="hero mb2">
      <canvas class="hcv" id="hcv2"></canvas>
      <div class="hi">
        <h1>${h<12?'🌅':'🌆'} ${h<12?'صباح الخير':'مساء الخير'} — الحوكمة والتقييم</h1>
        <div class="hs">${new Date().toLocaleDateString(App.lang==='ar'?'ar-SA':'en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
      </div>
      <div class="hb"></div>
    </div>
    <div class="g3 mb2">
      ${[
        {n:'1',t:'مراجعة المهام المتأخرة',d:'تأكد من وجود خطط للمهام المتأخرة',k:'tasks',ic:'✓'},
        {n:'2',t:'AFIs المفتوحة',d:'تابع خطط المعالجة والإغلاق',k:'afis',ic:'▲'},
        {n:'3',t:'التنبيهات الفنية',d:'هل هناك تنبيهات تحتاج إجراء؟',k:'alerts',ic:'⚠️'},
        {n:'4',t:'مؤشرات الأداء',d:'راجع KPIs الأسبوعية',k:'kpis',ic:'📈'},
        {n:'5',t:'فريقي',d:'من يحتاج دعماً أو توجيهاً؟',k:'team',ic:'👥'},
        {n:'6',t:'التحديث الأسبوعي',d:'ابعث تحديثك للحوكمة',k:'weekly',ic:'📊'},
      ].map(s=>`<div class="card ptr" onclick="go('${s.k}')" style="border-color:rgba(${DR},.2)">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">
          <div style="width:26px;height:26px;border-radius:50%;background:rgba(${DR},.18);border:1px solid rgba(${DR},.35);display:flex;align-items:center;justify-content:center;font-family:var(--hud);font-size:10.5px;font-weight:700;color:${DC}">${s.n}</div>
          <span style="font-size:17px">${s.ic}</span>
        </div>
        <div style="font-weight:700;font-size:13.5px;margin-bottom:3px">${s.t}</div>
        <div style="font-size:11.5px;color:var(--t2)">${s.d}</div>
      </div>`).join('')}
    </div>
    <div class="panel" style="border-color:rgba(${DR},.15)">
      <div class="ph" style="border-color:rgba(${DR},.12)"><h3 style="color:${DC}">📝 تحديث نهاية اليوم</h3></div>
      <div class="pb">
        <div class="fg">
          <div class="field"><label>ماذا أنجزنا اليوم؟</label><textarea id="d_done" rows="3" placeholder="الإنجازات والنتائج..."></textarea></div>
          <div class="field"><label>التحديات والعوائق</label><textarea id="d_blk" rows="3" placeholder="أي عقبات تحتاج متابعة..."></textarea></div>
        </div>
        <div class="field"><label>أولويات الغد</label><textarea id="d_nxt" rows="2" placeholder="أهم 3 أولويات لغداً..."></textarea></div>
        <button class="btn p" onclick="saveDU()" style="background:linear-gradient(135deg,${DC},${DC}99);border:none">📤 حفظ التحديث</button>
      </div>
    </div>`;
  initCanvas('hcv2','net','#7C3AED');
});
window.saveDU=async()=>{await logAct('daily_update',null,null,{done:mv('d_done'),block:mv('d_blk'),next:mv('d_nxt')});toast('تم حفظ التحديث ✓','s');};

/* ═══ TASKS — FULL CRUD + ASSIGN ══════════════════════════ */
reg('tasks',async el=>{
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div><h1 style="font-family:var(--hud);font-size:19px;color:${DC}">✓ إدارة المهام</h1>
      <div style="font-size:12.5px;color:var(--t2)">أنشئ المهام وتابعها وراجع تحديثات الفريق</div></div>
      <button class="btn p" onclick="go('ntask')" style="background:linear-gradient(135deg,${DC},${DC}99);border:none">+ مهمة جديدة</button>
    </div>
    <div class="panel" style="border-color:rgba(${DR},.15)">
      <div class="filters">
        <input class="fi" id="tq" placeholder="بحث...">
        <select class="fi" id="tst">
          <option value="">كل الحالات</option>
          <option value="new">جديد</option><option value="open">مفتوح</option>
          <option value="in_progress">قيد التنفيذ</option><option value="pending_review">بانتظار المراجعة</option>
          <option value="returned">مُعاد</option><option value="overdue">متأخر</option><option value="closed">مغلق</option>
        </select>
        <select class="fi" id="tpr">
          <option value="">كل الأولويات</option>
          <option value="critical">حرجة</option><option value="high">عالية</option>
          <option value="medium">متوسطة</option><option value="low">منخفضة</option>
        </select>
      </div>
      <div id="taskList">${skR()}</div>
    </div>`;

  async function load(){
    const el2=document.getElementById('taskList'),q=document.getElementById('tq')?.value||'',st=document.getElementById('tst')?.value||'',pr=document.getElementById('tpr')?.value||'';
    el2.innerHTML=skR();
    try{
      const opts={eq:{division:BL}};
      if(q)opts.ilike=['title',q];if(st)opts.eq={...opts.eq,status:st};if(pr)opts.eq={...opts.eq,priority:pr};
      const{data}=await dbList('tasks',opts);
      if(!data.length){el2.innerHTML=emptyEl('لا مهام',`<button class="btn p sm" onclick="go('ntask')">+ مهمة جديدة</button>`);return;}
      el2.innerHTML=`<div class="tw"><table>
        <thead><tr><th>الرقم</th><th>المهمة</th><th>المكلّف</th><th>الأولوية</th><th>الاستحقاق</th><th>الحالة</th><th></th></tr></thead>
        <tbody>${data.map(tk=>`<tr>
          <td class="fmono" style="font-size:11px;color:${DC}">${esc(tk.task_number||tk.id.slice(0,8))}</td>
          <td><div style="font-weight:600">${esc(tk.title)}</div>${tk.description?`<div style="font-size:11px;color:var(--t2)">${esc(tk.description.slice(0,55))}...</div>`:''}</td>
          <td style="font-size:12px;color:var(--t2)">${esc(tk.assignee_name||'—')}</td>
          <td>${priBadge(tk.priority)}</td>
          <td class="fmono" style="font-size:11px;color:${isOD(tk.due_date,tk.status)?'var(--danger)':'var(--t2)'}">${fmtD(tk.due_date)}</td>
          <td>${stBadge(tk.status)}</td>
          <td><div class="ta">
            <button class="btn sm" onclick="openTD('${tk.id}')">تفاصيل</button>
            <button class="btn sm" onclick="openTE('${tk.id}')">تعديل</button>
            <button class="btn sm d" onclick="confirm2('حذف المهمة؟',async()=>{await dbDel('tasks','${tk.id}');load();toast('تم الحذف','s')})">حذف</button>
          </div></td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    }catch(e){el2.innerHTML=`<div style="padding:18px;color:var(--danger)">${e.message}</div>`;}
  }
  ['tq','tst','tpr'].forEach(id=>{
    document.getElementById(id)?.addEventListener('input',()=>setTimeout(load,300));
    document.getElementById(id)?.addEventListener('change',load);
  });
  load(); window._rl=load;
});

/* Task Detail Modal */
window.openTD=async id=>{
  const tk=await dbGet('tasks',id).catch(()=>null);if(!tk)return;
  const{data:cmts}=await dbList('task_comments',{eq:{task_id:id}}).catch(()=>({data:[]}));
  openModal(`
    <div class="mh"><h3 style="color:${DC}">${esc(tk.task_number||tk.id.slice(0,8))}</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <div style="font-weight:700;font-size:15px;margin-bottom:8px">${esc(tk.title)}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">${priBadge(tk.priority)} ${stBadge(tk.status)} ${isOD(tk.due_date,tk.status)?'<span class="badge br">متأخرة</span>':''}</div>
      ${tk.description?`<div class="field"><label>الوصف</label><p style="font-size:13px;color:var(--t2)">${esc(tk.description)}</p></div>`:''}
      <div style="display:flex;gap:14px;margin-bottom:12px">
        <div><div style="font-size:10.5px;color:var(--t3)">الاستحقاق</div><div style="font-family:var(--mono);font-size:12.5px">${fmtD(tk.due_date)}</div></div>
        <div><div style="font-size:10.5px;color:var(--t3)">الحالة</div><div>${stBadge(tk.status)}</div></div>
      </div>
      <div style="font-family:var(--mono);font-size:9.5px;color:var(--t3);letter-spacing:.08em;margin-bottom:7px">التعليقات والتحديثات (${cmts.length})</div>
      <div id="cmtList" style="max-height:180px;overflow-y:auto;margin-bottom:10px">
        ${cmts.length?cmts.map(c=>`<div style="padding:8px 10px;background:var(--bg1);border-radius:var(--rs);margin-bottom:5px">
          <div style="font-size:10.5px;color:var(--t3);margin-bottom:2px">${fmtD(c.created_at)}</div>
          <div style="font-size:13px">${esc(c.content)}</div>
        </div>`).join(''):emptyEl('لا تعليقات')}
      </div>
      <div style="display:flex;gap:7px;margin-bottom:10px">
        <input id="ncmt" placeholder="أضف تعليقاً أو تحديثاً..." style="flex:1;background:var(--bg1);border:1px solid var(--bd);border-radius:var(--rs);padding:7px 11px;font-size:13px;color:var(--t1);font-family:var(--fa)">

reg('meetings', async el => {
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div>
        <h1 style="font-family:var(--hud);font-size:18px;color:var(--DC)">📅 ${t2('الاجتماعات','Meetings')}</h1>
        <div style="font-size:12px;color:var(--t3)">${t2('الاجتماعات الأسبوعية والربعية والطارئة','Weekly, quarterly and emergency meetings')}</div>
      </div>
      <button class="btn p" onclick="openNewMeeting()" style="background:var(--DC);border-color:var(--DC)">+ ${t2('اجتماع جديد','New Meeting')}</button>
    </div>
    <div id="meetingsContent">${skR(3)}</div>`;
  try {
    const {data} = await dbList('meetings', {eq:{division:BL}, ord:'date', asc:false, lim:30});
    const c = document.getElementById('meetingsContent');
    if(!c) return;
    if(!data||!data.length){c.innerHTML=emptyEl(t2('لا اجتماعات بعد','No meetings yet'),`<button class="btn sm p" onclick="openNewMeeting()">+ ${t2('اجتماع جديد','New Meeting')}</button>`);return;}
    c.innerHTML='<div class="panel">'+data.map(m=>`
      <div class="meeting-card ptr" onclick="openMeetingDetail('${m.id}')">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap">
          <span class="meeting-type ${m.type}">${{weekly:t2('أسبوعي','Weekly'),quarterly:t2('ربعي','Quarterly'),emergency:t2('طارئ','Emergency'),one_on_one:t2('ثنائي','1:1')}[m.type]||m.type}</span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--t3)">${fmtD(m.date)} ${m.time||''}</span>
          <span class="badge ${m.status==='completed'?'bgn':m.status==='cancelled'?'br':'bb'}" style="margin-left:auto">${t2({scheduled:'مجدول',completed:'منتهى',cancelled:'ملغي'}[m.status]||m.status,m.status)}</span>
        </div>
        <div style="font-weight:600;font-size:13px">${esc(m.title)}</div>
        ${m.agenda?`<div style="font-size:12px;color:var(--t3);margin-top:2px">${esc(m.agenda.slice(0,80))}${m.agenda.length>80?'…':''}</div>`:''}
      </div>`).join('')+'</div>';
  } catch(e){const c=document.getElementById('meetingsContent');if(c)c.innerHTML=emptyEl(e.message);}
});

function openNewMeeting(){
  openModal(`<div class="mh"><h3>📅 ${t2('اجتماع جديد','New Meeting')}</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd"><div class="fg2">
      <div class="field ff"><label>${t2('العنوان','Title')}</label><input id="mt_t" placeholder="..."></div>
      <div class="field"><label>${t2('النوع','Type')}</label><select id="mt_ty">
        <option value="weekly">${t2('أسبوعي','Weekly')}</option>
        <option value="quarterly">${t2('ربعي','Quarterly')}</option>
        <option value="emergency">${t2('طارئ','Emergency')}</option>
        <option value="one_on_one">${t2('ثنائي','1:1')}</option>
      </select></div>
      <div class="field"><label>${t2('التاريخ','Date')}</label><input type="date" id="mt_d" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="field"><label>${t2('الوقت','Time')}</label><input type="time" id="mt_ti" value="09:00"></div>
      <div class="field ff"><label>${t2('الأجندة','Agenda')}</label><textarea id="mt_a" rows="3" style="width:100%;background:#060F1E;border:1px solid #152840;color:var(--t1);border-radius:8px;padding:8px;font-family:inherit;resize:vertical"></textarea></div>
    </div></div>
    <div class="mf"><button class="btn" onclick="closeModal()">${t2('إلغاء','Cancel')}</button>
    <button class="btn p" onclick="saveMeeting()">${t2('حفظ','Save')}</button></div>`);
}

async function saveMeeting(){
  const title=mv('mt_t');
  if(!title){toast(t2('أدخل العنوان','Enter title'),'e');return;}
  try{
    await dbIns('meetings',{title,type:mv('mt_ty')||'weekly',date:mv('mt_d'),time:mv('mt_ti'),
      agenda:mv('mt_a'),organizer_id:App.profile.id,division:BL,status:'scheduled'});
    toast(t2('تم الحفظ ✓','Saved ✓'),'s');closeModal();go('meetings');
  }catch(e){toast('Error: '+e.message,'e');}
}

async function openMeetingDetail(id){
  try{
    const m=await dbGet('meetings',id);
    const {data:actions}=await dbList('meeting_actions',{eq:{meeting_id:id}});
    openModal(`<div class="mh"><h3>📅 ${esc(m.title)}</h3><button class="mx" onclick="closeModal()">×</button></div>
      <div class="mbd">
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <span class="meeting-type ${m.type}">${m.type}</span>
          <span style="font-size:12px;color:var(--t3)">${fmtD(m.date)} ${m.time||''}</span>
        </div>
        ${m.agenda?`<div class="field" style="margin-bottom:12px"><label>${t2('الأجندة','Agenda')}</label><div style="padding:8px;background:#060F1E;border-radius:8px;font-size:13px">${esc(m.agenda)}</div></div>`:''}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
          <div style="font-weight:600;font-size:13px">${t2('الإجراءات','Actions')}</div>
          <button class="btn sm" onclick="addMAction('${id}')" style="color:var(--DC)">+ ${t2('إجراء','Action')}</button>
        </div>
        <div style="border:1px solid var(--bd);border-radius:8px;overflow:hidden">${actions.length?actions.map(a=>`<div class="action-row"><span class="badge ${a.status==='closed'?'bgn':'bb'}" style="font-size:9px">${a.status}</span><span style="flex:1;margin:0 8px">${esc(a.title)}</span>${a.due_date?`<span style="font-size:11px;color:var(--t3)">${fmtD(a.due_date)}</span>`:''}${priBadge(a.priority)}</div>`).join(''):`<div style="padding:12px;text-align:center;color:var(--t3);font-size:12px">${t2('لا إجراءات','No actions')}</div>`}</div>
        <div style="margin-top:12px;display:flex;gap:7px">
          <button class="btn sm p" onclick="updateMeetingStatus('${id}','completed')" style="background:var(--success);border-color:var(--success)">${t2('إنهاء الاجتماع','Complete')}</button>
          <button class="btn sm d" onclick="updateMeetingStatus('${id}','cancelled')">${t2('إلغاء','Cancel')}</button>
        </div>
      </div>
      <div class="mf"><button class="btn" onclick="closeModal()">${t2('إغلاق','Close')}</button></div>`,'w');
  }catch(e){toast(e.message,'e');}
}

function addMAction(meetingId){
  openModal(`<div class="mh"><h3>+ ${t2('إجراء جديد','New Action')}</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <div class="field"><label>${t2('العنوان','Title')}</label><input id="ma_t" placeholder="..."></div>
      <div class="field"><label>${t2('الاستحقاق','Due Date')}</label><input type="date" id="ma_d"></div>
      <div class="field"><label>${t2('الأولوية','Priority')}</label><select id="ma_p">
        <option value="low">${t2('منخفضة','Low')}</option>
        <option value="medium" selected>${t2('متوسطة','Medium')}</option>
        <option value="high">${t2('عالية','High')}</option>
        <option value="critical">${t2('حرج','Critical')}</option>
      </select></div>
    </div>
    <div class="mf"><button class="btn" onclick="openMeetingDetail('${meetingId}')">${t2('رجوع','Back')}</button>
    <button class="btn p" onclick="saveMAction('${meetingId}')">${t2('حفظ','Save')}</button></div>`);
}

async function saveMAction(meetingId){
  const title=mv('ma_t');
  if(!title){toast(t2('أدخل العنوان','Enter title'),'e');return;}
  try{
    await dbIns('meeting_actions',{meeting_id:meetingId,title,due_date:mv('ma_d')||null,
      priority:mv('ma_p')||'medium',assigned_by:App.profile.id,assigned_to:App.profile.id,status:'open'});
    toast(t2('تم الحفظ ✓','Saved ✓'),'s');openMeetingDetail(meetingId);
  }catch(e){toast(e.message,'e');}
}

async function updateMeetingStatus(id,status){
  try{
    await dbUpd('meetings',id,{status,updated_at:new Date().toISOString()});
    toast(status==='completed'?t2('تم إنهاء الاجتماع ✓','Meeting completed ✓'):t2('تم الإلغاء','Cancelled'),'s');
    closeModal();go('meetings');
  }catch(e){toast(e.message,'e');}
}
