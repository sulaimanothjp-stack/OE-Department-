<!DOCTYPE html>
<html lang="en" dir="ltr" id="root">
<head>
<meta charset="UTF-8">
<script>document.documentElement.lang="en";document.documentElement.dir="ltr";</script>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>SE · دائرة التوزيع</title>
<link rel="stylesheet" href="styles.css">
<style>
:root{--DC:#10B981;--DR:16,185,129}
body{background:#020912}
.sb{--SB:linear-gradient(180deg,#10B9810A,#020912)}
.ni.on{color:#10B981;background:rgba(16,185,129,.13)}
.ni.on::after{background:#10B981}
.ni:hover{color:#A7F3D0}
.tb-ttl{color:#10B981!important}
.clk .ct{color:#10B981!important}
.hero{background:linear-gradient(135deg,#10B98108,#020912)}
.ld .d{color:#10B981;background:#10B981}
.tr2:hover{background:rgba(16,185,129,.05)}

/* Mobile Menu Styles */
.menu-btn { display:none; background:none; border:none; color:var(--DC); font-size:24px; cursor:pointer; padding:0 10px; margin-right:10px; }
@media(max-width:768px){
  .sb { display:none; position:fixed; top:0; right:0; height:100vh; z-index:2000; box-shadow:-5px 0 25px rgba(0,0,0,0.8); }
  .sb.show { display:flex; }
  .menu-btn { display:block!important; }
}
</style>
</head>
<body>
<div class="shell">
<aside class="sb" id="sidebar">
  <div class="sb-brand">
    <div id="lgEl"></div>
    <div><div class="sb-t1" style="color:#10B981">se</div><div class="sb-t2">دائرة التوزيع</div></div>
  </div>
  <div id="ubEl" class="ub"></div>
  <nav class="nav" id="navEl"></nav>
  <div class="sb-foot">
    <button class="btn-lo" onclick="doLogout()">🚪 خروج</button>
    <button class="btn-lg" onclick="openLangPicker()" title="Language / اللغة">🌐</button>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('show')">☰</button>
      <div class="tb-ttl fhud" id="pgtitle">دائرة التوزيع</div>
    </div>
    <div class="tb-r">
      <div class="clk"><div class="ct" id="ct"></div><div id="cd" style="font-family:var(--mono);font-size:9.5px;color:var(--t3)"></div></div>
      <button class="nbtn" onclick="toast(t2('لا إشعارات جديدة','No new notifications'),'i')">🔔<span class="ndot" id="ndot" style="display:none"></span></button>
      <div class="ld"><div class="d"></div><span style="color:#10B98144;font-family:var(--mono);font-size:11px">LIVE</span></div>
    </div>
  </div>
  <div class="page" id="pgContent"></div>
</div>
</div>
<div id="tc"></div>
<script src="lang.js"></script>
<script src="app.js"></script>
<script>
const BL = 'distribution';
const DC = '#10B981';
const DR = '16,185,129';
const NAV = [
  {k:'dash',   ar:'لوحة المتابعة',       en:'Dashboard',     ic:'🏘️', fn:"go('dash')"},
  {k:'daily',  ar:'يوم العمل',            en:'My Day',        ic:'☀️', fn:"go('daily')"},
  {g:'المهام',ge:'TASKS'},
  {k:'tasks',  ar:'المهام',               en:'Tasks',         ic:'✓',  fn:"go('tasks')"},
  {k:'ntask',  ar:'مهمة جديدة',           en:'New Task',      ic:'➕', fn:"go('ntask')"},
  {g:'التحسين',ge:'IMPROVEMENT'},
  {k:'afis',   ar:'نقاط التحسين',         en:'AFIs',          ic:'▲',  fn:"go('afis')"},
  {k:'kpis',   ar:'مؤشرات الأداء',        en:'KPIs',          ic:'📈', fn:"go('kpis')"},
  {k:'assess', ar:'التقييمات',            en:'Assessments',   ic:'▤',  fn:"go('assess')"},
  {g:'الفريق',ge:'TEAM'},
  {k:'team',   ar:'الفريق',               en:'Team',          ic:'👥', fn:"go('team')"},
  {k:'reviews', ar:'مراجعة الإنجازات',    en:'Review Completions', ic:'✅', fn:"go('reviews')"},
  {g:'متابعة',ge:'TRACKING'},
  {k:'alerts', ar:'التنبيهات',            en:'Alerts',        ic:'⚠️', fn:"go('alerts')"},
  {k:'weekly', ar:'التحديث الأسبوعي',    en:'Weekly Update', ic:'📊', fn:"go('weekly')"},
];
const PAGES = {};
function reg(k,fn){PAGES[k]=fn;}

function go(k){
  document.getElementById('sidebar').classList.remove('show');
  const item=NAV.find(n=>n.k===k);
  document.getElementById('pgtitle').textContent=item?t2(item.ar,item.en):k;
  buildNav(NAV,k);
  const ct=document.getElementById('pgContent');
  ct.innerHTML='<div class="fade" id="pg"></div>';
  const fn=PAGES[k];
  if(fn)fn(document.getElementById('pg'));
  else document.getElementById('pg').innerHTML=`<p style="padding:40px;color:var(--t3)">${t2('قيد البناء…', 'Coming soon...')}</p>`;
  window.scrollTo(0,0);
}

/* ═══ TEAM + CREATE EMPLOYEE ═══════════════════════════════ */
reg('team',async el=>{
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h1 style="font-family:var(--hud);font-size:19px;color:${DC}">👥 ${t2('فريق التوزيع', 'Distribution Team')}</h1>
      <button class="btn p" onclick="openCreateEmp()" style="background:linear-gradient(135deg,${DC},${DC}99);border:none">+ ${t2('إضافة موظف', 'Add Employee')}</button>
    </div>
    <div class="g3" id="tGrid">${skR(3)}</div>`;
  const{data}=await dbList('profiles',{eq:{division:BL}}).catch(()=>({data:[]}));
  document.getElementById('tGrid').innerHTML=data.length?data.map(m=>{
    const init=(m.full_name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return`<div class="card" style="border-color:rgba(${DR},.2);text-align:center;padding:18px">
      <div style="width:48px;height:48px;border-radius:12px;background:rgba(${DR},.18);border:1px solid rgba(${DR},.35);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;margin:0 auto 10px;color:${DC}">${init}</div>
      <div style="font-weight:700;font-size:13.5px">${esc(App.lang==='ar'?m.full_name:m.full_name_en||m.full_name)}</div>
      <div style="font-size:11px;color:var(--t2);font-family:var(--mono);margin-top:3px">${esc(m.job_title||t2(ROLE_AR[m.role], m.role)||'')}</div>
      <button class="btn sm p" style="width:100%;margin-top:10px;background:linear-gradient(135deg,${DC}44,${DC}22);border:1px solid ${DC}44;color:${DC}" onclick="go('ntask')">+ ${t2('مهمة', 'Task')}</button>
    </div>`;
  }).join(''):emptyEl(t2('لا أعضاء', 'No team members'));
});

window.openCreateEmp = () => {
  openModal(`<div class="mh"><h3 style="color:${DC}">👤 ${t2('إنشاء موظف جديد', 'Create New Employee')}</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <div class="field ff"><label>${t2('الاسم الكامل *', 'Full Name *')}</label><input id="ce_name" placeholder="..."></div>
      <div class="field">
        <label>${t2('الرقم الوظيفي *', 'Employee ID *')}</label>
        <div style="display:flex;gap:7px">
          <input type="text" id="ce_empid" placeholder="12345" style="direction:ltr;text-align:right;flex:1">
          <button class="btn sm" onclick="genEmpId()">🔀 ${t2('توليد', 'Gen')}</button>
        </div>
      </div>
      <div class="field">
        <label>${t2('كلمة المرور المؤقتة *', 'Temp Password *')}</label>
        <div style="display:flex;gap:7px">
          <input type="text" id="ce_pw" placeholder="...">
          <button class="btn sm" onclick="genEmpPW()">🔀 ${t2('توليد', 'Gen')}</button>
        </div>
      </div>
      <div class="field"><label>${t2('المسمى الوظيفي', 'Job Title')}</label><input id="ce_title" placeholder="..."></div>
    </div>
    <div class="mf">
      <button class="btn" onclick="closeModal()">${t2('إلغاء', 'Cancel')}</button>
      <button class="btn p" id="ceBtn" onclick="doCreateEmp()" style="background:linear-gradient(135deg,${DC},${DC}99);border:none">${t2('إنشاء الحساب', 'Create Account')}</button>
    </div>`);
  genEmpPW();
};
window.genEmpId = () => { const el = document.getElementById('ce_empid'); if(el) el.value = Math.floor(10000 + Math.random()*90000).toString(); };
window.genEmpPW = () => {
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789@#$!'; let p='';
  for(let i=0;i<10;i++) p+=ch[Math.floor(Math.random()*ch.length)];
  const el=document.getElementById('ce_pw'); if(el) el.value=p;
};
window.doCreateEmp = async () => {
  const name = mv('ce_name'), empId = mv('ce_empid'), pass = mv('ce_pw');
  if(!name||!empId||!pass){toast(t2('يرجى تعبئة الحقول المطلوبة', 'Please fill all fields'),'e');return;}
  const btn = document.getElementById('ceBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  const sess = getStoredSession();
  try{
    const authRes = await fetch(SB_URL+'/auth/v1/signup',{
      method:'POST', headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email:empId+'@se.local', password:pass, data:{full_name:name,role:'employee',division:BL}})
    });
    const authData = await authRes.json();
    if(authData.error){ toast('Error: '+authData.error_description,'e'); if(btn){btn.disabled=false;btn.innerHTML=t2('إنشاء', 'Create');} return; }
    
    const uid = authData.id||authData.user?.id;
    if(uid){
      await fetch(SB_URL+'/rest/v1/profiles?on_conflict=id',{
        method:'POST', headers:{'apikey':SB_KEY,'Authorization':'Bearer '+(sess?.access_token||''),'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
        body:JSON.stringify({id:uid, full_name:name, role:'employee', username:empId, division:BL, employee_id:empId, job_title:mv('ce_title')||null, is_active:true})
      });
    }
    closeModal(); go('team'); toast(t2('تم إنشاء الحساب ✓', 'Account created ✓'), 's');
  }catch(e){ toast('Error: '+e.message,'e'); if(btn){btn.disabled=false;btn.innerHTML=t2('إنشاء', 'Create');} }
};

/* ═══ OTHER PAGES (Minimal) ══════════════════ */
reg('dash',async el=>{ el.innerHTML=`<div class="hero mb2"><canvas class="hcv" id="hcv"></canvas><div class="hi"><h1>🏘️ ${t2('التوزيع — شبكة حية', 'Distribution')}</h1></div></div>`; initCanvas('hcv','city',DC); });
['daily','tasks','ntask','afis','kpis','assess','reviews','alerts','weekly'].forEach(k=>reg(k,el=>{
  el.innerHTML=`<h1 style="color:${DC};margin-bottom:14px">${NAV.find(n=>n.k===k)?.ar||k}</h1><div class="panel pb"><p style="color:var(--t2)">${t2('قيد التطوير...', 'Under development...')}</p></div>`;
}));

(async()=>{
  const p=await initPage({roles:['distribution_manager','admin','director','governance_manager']});
  if(!p)return;
  document.getElementById('lgEl').innerHTML=LOGO;
  buildNav(NAV,'dash');go('dash');
})();
</script>
</body>
</html>
