<!DOCTYPE html>
<html lang="ar" dir="rtl" id="root">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SE · دائرة الحوكمة والتقييم — المايسترو</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ═══ GOVERNANCE — THE MAESTRO ═══════════════════════════════════ */
:root{--div-color:#7C3AED;--div-glow:rgba(124,58,237,.35)}
body{background:#030812}
.sidebar{background:linear-gradient(180deg,#0E0520 0%,#060210 100%)}
.nav-item.active{color:#A78BFA;background:rgba(124,58,237,.15)}
.nav-item.active::after{background:var(--div-color)}
.nav-item:hover{color:#A78BFA}

/* HERO — governance network canvas */
.gov-hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0E0520 0%,#140830 50%,#0A0418 100%);
  border:1px solid rgba(124,58,237,.25);
  border-radius:16px;margin-bottom:22px;
  min-height:200px;
}
.gov-hero-canvas{position:absolute;inset:0;z-index:0}
.gov-hero-content{position:relative;z-index:1;padding:28px 32px}
.gov-hero-content h1{
  font-family:var(--font-hud);font-size:28px;font-weight:700;
  background:linear-gradient(135deg,#fff 0%,#A78BFA 60%,#7C3AED 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;
}
.gov-hero-content .tagline{font-size:13.5px;color:#A78BFA88;margin-bottom:20px;font-style:italic}
.hero-kpis{display:flex;gap:24px;flex-wrap:wrap}
.hero-kpi{text-align:center}
.hero-kpi .hk-val{font-family:var(--font-hud);font-size:26px;font-weight:700;color:#fff;line-height:1}
.hero-kpi .hk-lbl{font-family:var(--font-mono);font-size:10px;color:#A78BFA88;margin-top:3px;letter-spacing:.08em}
.hero-kpi.danger .hk-val{color:#F87171}
.hero-kpi.warning .hk-val{color:#FCD34D}
.hero-kpi.good .hk-val{color:#34D399}

/* Animated governance signal bar */
.signal-bar{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#7C3AED,#A78BFA,#7C3AED,transparent);
  background-size:200% 100%;
  animation:signal-flow 3s linear infinite;
}
@keyframes signal-flow{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Attention feed — "command radar" style */
.attn-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;
  border-bottom:1px solid rgba(124,58,237,.1);
  transition:.15s;cursor:pointer;
}
.attn-item:hover{background:rgba(124,58,237,.07)}
.attn-item:last-child{border-bottom:none}
.attn-pulse{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px;
  animation:attn-blink 2s ease-in-out infinite;
}
.attn-pulse.critical{background:#EF4444;box-shadow:0 0 8px #EF4444}
.attn-pulse.high{background:#F59E0B;box-shadow:0 0 6px #F59E0B}
.attn-pulse.medium{background:#3B82F6;box-shadow:0 0 6px #3B82F6}
.attn-pulse.good{background:#10B981;box-shadow:0 0 6px #10B981;animation:none}
@keyframes attn-blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* Division orbit (compact) */
.div-orbit{
  display:flex;justify-content:space-around;align-items:center;
  padding:14px;gap:8px;flex-wrap:wrap;
}
.div-orb{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  flex:1;min-width:80px;cursor:pointer;padding:10px 8px;
  border-radius:12px;border:1px solid;transition:.2s;
}
.div-orb:hover{transform:translateY(-3px)}
.div-orb .orb-ic{font-size:22px}
.div-orb .orb-name{font-size:10.5px;font-weight:600;text-align:center}
.div-orb .orb-score{font-family:var(--font-hud);font-size:18px;font-weight:700}
.div-orb .orb-status{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em}
.div-orb .orb-bar{width:100%;height:3px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden}
.div-orb .orb-fill{height:100%;border-radius:99px;transition:width .8s ease}

/* Pipeline stages */
.pipeline{display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:4px}
.pip-stage{
  flex:1;min-width:80px;text-align:center;padding:10px 6px;
  font-size:11.5px;font-weight:600;
  border:1px solid var(--border);
  border-left:none;position:relative;
  cursor:pointer;transition:.14s;white-space:nowrap;
}
.pip-stage:first-child{border-left:1px solid var(--border);border-radius:var(--r-s) 0 0 var(--r-s)}
.pip-stage:last-child{border-radius:0 var(--r-s) var(--r-s) 0}
.pip-stage:hover{background:rgba(124,58,237,.1)}
.pip-stage.has-items{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.3)}
.pip-stage.overdue{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3)}
.pip-count{
  display:block;font-family:var(--font-hud);font-size:20px;color:#A78BFA;
  line-height:1;margin-bottom:4px;
}
.pip-stage.overdue .pip-count{color:#F87171}

/* KPI spark rows */
.kpi-row{
  display:flex;align-items:center;gap:12px;padding:9px 14px;
  border-bottom:1px solid rgba(255,255,255,.04);transition:.14s;
}
.kpi-row:hover{background:rgba(124,58,237,.05)}
.kpi-row:last-child{border-bottom:none}
.kpi-name{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kpi-val{font-family:var(--font-hud);font-size:14px;font-weight:700;min-width:50px;text-align:left}
.kpi-trend{font-size:16px;min-width:20px}
.kpi-bar-wrap{flex:1;max-width:100px}

/* Status rings */
.status-ring{
  width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  box-shadow:0 0 12px var(--div-glow);
}
</style>
</head>
<body>
<div class="app-shell">
<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div id="logoSvg" class="se-logo-svg"></div>
    <div class="brand-text">
      <div class="t1" style="color:#A78BFA">se</div>
      <div class="t2" style="color:#6D5D9A">الحوكمة والتقييم</div>
    </div>
  </div>
  <div class="user-badge" id="userBadge"></div>
  <nav class="nav-section" id="navSection"></nav>
  <div class="sidebar-foot">
    <button class="btn-logout" onclick="doLogout()">🚪 <span data-ar="خروج" data-en="Logout">خروج</span></button>
    <button class="btn-lang" onclick="toggleLang()">EN/ع</button>
  </div>
</aside>

<!-- MAIN -->
<div class="main-area">
  <div class="topbar">
    <div class="topbar-title font-hud" id="pageTitle" style="color:#A78BFA">الحوكمة والتقييم — المايسترو</div>
    <div class="topbar-right">
      <div class="clock-widget">
        <div class="clock-time" id="clockTime" style="color:#A78BFA"></div>
        <div class="clock-date" id="clockDate"></div>
        <div class="clock-greeting" id="clockGreet" style="color:#6D5D9A"></div>
      </div>
      <button class="notif-btn" onclick="openNotifs()">🔔<span class="notif-dot" id="notifDot" style="display:none"></span></button>
      <div class="status-dot">
        <div class="dot" style="background:#A78BFA;box-shadow:0 0 6px #A78BFA"></div>
        <span style="color:#6D5D9A;font-family:var(--font-mono);font-size:11px">MAESTRO</span>
      </div>
    </div>
  </div>
  <div class="page-content" id="pageContent"></div>
</div>
</div>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
<script>
// ═══ NAV ══════════════════════════════════════════════════════════
const NAV=[
  {key:'dashboard',  ar:'لوحة الحوكمة',        en:'Governance Hub',       icon:'◧'},
  {key:'daily',      ar:'يوم الحوكمة',          en:'My Day',               icon:'☀️'},
  {group:'التقييمات',groupEn:'ASSESSMENTS'},
  {key:'assessments',ar:'التقييمات',            en:'Assessments',          icon:'▤'},
  {key:'assessors',  ar:'المقيّمون',            en:'Assessors',            icon:'👤'},
  {key:'evidence',   ar:'مراجعة الأدلة',        en:'Evidence Review',      icon:'📎'},
  {group:'نقاط التحسين',groupEn:'AFIs'},
  {key:'afis',       ar:'نقاط التحسين (AFIs)',  en:'AFIs',                 icon:'▲'},
  {group:'الأداء',groupEn:'PERFORMANCE'},
  {key:'kpis',       ar:'مؤشرات الأداء',        en:'KPIs',                 icon:'📈'},
  {key:'xdivision',  ar:'أداء الدوائر',         en:'Cross-Division',       icon:'◉'},
  {group:'الإطار',groupEn:'FRAMEWORK'},
  {key:'framework',  ar:'إطار OE',             en:'OE Framework',         icon:'🏗️'},
  {key:'docs',       ar:'الوثائق والسياسات',    en:'Policies & Docs',      icon:'▣'},
  {group:'التنسيق',groupEn:'COORDINATION'},
  {key:'meetings',   ar:'الاجتماعات',           en:'Meetings',             icon:'📅'},
  {key:'tickets',    ar:'التذاكر',              en:'Tickets',              icon:'🎫'},
  {key:'evaluation', ar:'تقييم الموظفين',       en:'Evaluation',           icon:'⭐'},
];
const PAGES={};
function reg(k,fn){PAGES[k]=fn;}
let _cur='dashboard';
function go(k){
  _cur=k;
  const found=NAV.find(i=>i.key===k);
  document.getElementById('pageTitle').textContent=found?(App.lang==='ar'?found.ar:found.en):k;
  buildSidebar(NAV,k);
  const pc=document.getElementById('pageContent');
  pc.innerHTML='<div class="page-fade" id="pg"></div>';
  (PAGES[k]||function(el){el.innerHTML='<p style="padding:40px;color:var(--text-2)">قيد البناء…</p>';})(document.getElementById('pg'));
}

// ═══ GOVERNANCE NETWORK CANVAS ════════════════════════════════════
function drawGovernanceNet(canvasId){
  const cv=document.getElementById(canvasId);if(!cv)return;
  const cx=cv.getContext('2d');
  let W,H,nodes=[],t=0;
  const colors=['#7C3AED','#9F67F5','#A78BFA','#C4B5FD','#5B21B6'];
  function resize(){const r=cv.parentElement.getBoundingClientRect();W=cv.width=r.width;H=cv.height=r.height;build();}
  function build(){
    nodes=[];const n=Math.floor(W*H/5000);
    for(let i=0;i<n;i++) nodes.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
      r:Math.random()*3+1.5,p:Math.random()*Math.PI*2,
      hub:Math.random()>.8,
      c:colors[Math.floor(Math.random()*colors.length)]
    });
  }
  function draw(){
    t+=.012;cx.clearRect(0,0,W,H);
    nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;n.p+=.02;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;});
    // connections
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d>110)continue;
      const al=(1-d/110)*.25;
      cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);
      cx.strokeStyle=`rgba(124,58,237,${al})`;cx.lineWidth=.7;cx.stroke();
      // pulse particle
      const fp=((t*.8+i*.3)%1);
      cx.beginPath();cx.arc(a.x+(b.x-a.x)*fp,a.y+(b.y-a.y)*fp,1.5,0,Math.PI*2);
      cx.fillStyle=`rgba(167,139,250,${al*2})`;cx.fill();
    }
    nodes.forEach(n=>{
      const glow=Math.sin(n.p)*.4+.6;
      if(n.hub){
        cx.beginPath();cx.arc(n.x,n.y,n.r*3,0,Math.PI*2);
        cx.strokeStyle=`rgba(124,58,237,${.15*glow})`;cx.lineWidth=1;cx.stroke();
      }
      cx.beginPath();cx.arc(n.x,n.y,n.r,0,Math.PI*2);
      cx.fillStyle=n.hub?`rgba(167,139,250,${glow})`:`rgba(124,58,237,${glow*.7})`;cx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();window.addEventListener('resize',resize);draw();
}

// ═══ DASHBOARD ════════════════════════════════════════════════════
reg('dashboard',async el=>{
  el.innerHTML=`
    <!-- HERO: Governance Network -->
    <div class="gov-hero">
      <canvas class="gov-hero-canvas" id="govNetCanvas"></canvas>
      <div class="gov-hero-content">
        <h1>🏛 الحوكمة والتقييم — المايسترو</h1>
        <div class="tagline">"المشرف على منظومة التميز التشغيلي — الإطار، التقييم، المؤشرات، والتحسين المستمر"</div>
        <div class="hero-kpis" id="heroKpis">
          <div class="hero-kpi"><div class="hk-val">—</div><div class="hk-lbl">تقييمات نشطة</div></div>
          <div class="hero-kpi"><div class="hk-val">—</div><div class="hk-lbl">AFIs مفتوحة</div></div>
          <div class="hero-kpi"><div class="hk-val">—</div><div class="hk-lbl">AFIs متأخرة</div></div>
          <div class="hero-kpi"><div class="hk-val">—</div><div class="hk-lbl">تذاكر معلّقة</div></div>
        </div>
      </div>
      <div class="signal-bar"></div>
    </div>

    <!-- DIVISION ORBIT -->
    <div class="panel mb-3">
      <div class="panel-head">
        <h3 style="color:#A78BFA">◉ نبض الدوائر — حالة لحظية</h3>
        <span class="font-mono text-xs" style="color:#6D5D9A">يتحدث كل 30 ثانية</span>
      </div>
      <div class="div-orbit" id="divOrbit">
        ${Object.entries(DIVISIONS).map(([k,d])=>`
          <div class="div-orb" style="border-color:${d.color}30;color:${d.color}" onclick="window.location.href='${k==='national_grid'?'national-grid':k}.html'">
            <div class="orb-ic">${d.icon}</div>
            <div class="orb-name" style="color:#ccc">${App.lang==='ar'?d.ar:d.en}</div>
            <div class="orb-score" id="orb_score_${k}">—</div>
            <div class="orb-status" id="orb_status_${k}" style="color:#888">…</div>
            <div class="orb-bar"><div class="orb-fill" id="orb_fill_${k}" style="width:0%;background:${d.color}"></div></div>
          </div>`).join('')}
      </div>
    </div>

    <div class="grid g21 mb-3">
      <!-- ATTENTION FEED -->
      <div class="panel">
        <div class="panel-head" style="border-bottom:1px solid rgba(124,58,237,.15)">
          <h3 style="color:#A78BFA">⚡ يحتاج انتباهك الآن</h3>
          <span class="font-mono text-xs" style="color:#6D5D9A" id="attnCount">تحميل…</span>
        </div>
        <div id="attnFeed"></div>
      </div>
      <!-- ASSESSMENT PIPELINE -->
      <div class="panel">
        <div class="panel-head" style="border-bottom:1px solid rgba(124,58,237,.15)">
          <h3 style="color:#A78BFA">▤ خط أنابيب التقييمات</h3>
          <button class="btn sm secondary" onclick="go('assessments')">+ جديد</button>
        </div>
        <div style="padding:14px" id="pipeWrap">
          <div class="pipeline" id="pipeline"></div>
        </div>
        <div id="stageDetail" style="padding:0 14px 14px"></div>
      </div>
    </div>

    <div class="grid g2">
      <!-- KPI LIVE -->
      <div class="panel">
        <div class="panel-head" style="border-bottom:1px solid rgba(124,58,237,.15)">
          <h3 style="color:#A78BFA">📈 مؤشرات الأداء — نظرة عامة</h3>
          <button class="btn sm secondary" onclick="go('kpis')">إدارة KPIs</button>
        </div>
        <div id="kpiLive"></div>
      </div>
      <!-- AFI OVERVIEW -->
      <div class="panel">
        <div class="panel-head" style="border-bottom:1px solid rgba(124,58,237,.15)">
          <h3 style="color:#A78BFA">▲ نقاط التحسين — متابعة</h3>
          <button class="btn sm secondary" onclick="go('afis')">+ AFI</button>
        </div>
        <div id="afiOverview"></div>
      </div>
    </div>`;

  drawGovernanceNet('govNetCanvas');

  try{
    const [assmtCount,afiCount,overdueAfi,ticketCount,health,kpis,afis,assmts]=await Promise.all([
      dbCount('assessments',{neq:{stage:'closed'}}),
      dbCount('afis',{neq:{status:'closed'}}),
      dbCount('afis',{eq:{status:'overdue'}}),
      dbCount('tickets',{neq:{status:'closed'}}),
      loadDivisionHealth(),
      dbList('kpis',{limit:6}),
      dbList('afis',{neq:{status:'closed'},limit:8}),
      dbList('assessments',{neq:{stage:'closed'}}),
    ]);

    // Hero KPIs
    const hk=document.getElementById('heroKpis');
    if(hk) hk.innerHTML=[
      {v:assmtCount,l:'تقييمات نشطة',t:assmtCount>0?'':'good'},
      {v:afiCount,l:'AFIs مفتوحة',t:afiCount>5?'warning':''},
      {v:overdueAfi,l:'AFIs متأخرة',t:overdueAfi>0?'danger':'good'},
      {v:ticketCount,l:'تذاكر معلّقة',t:''},
    ].map(k=>`<div class="hero-kpi ${k.t}"><div class="hk-val">${k.v}</div><div class="hk-lbl">${k.l}</div></div>`).join('');

    // Division orbit scores
    health.forEach(d=>{
      const score=d.overdue_afis>2?55:d.open_afis>5?72:d.open_alerts>2?78:92;
      const sc=score>=85?'good':score>=65?'warning':'danger';
      const sc_ar=score>=85?'ممتاز':score>=65?'تحذير':'يحتاج تدخل';
      const el_s=document.getElementById(`orb_score_${d.code}`);
      const el_t=document.getElementById(`orb_status_${d.code}`);
      const el_f=document.getElementById(`orb_fill_${d.code}`);
      const clr=score>=85?'#34D399':score>=65?'#FCD34D':'#F87171';
      if(el_s){el_s.textContent=score+'%';el_s.style.color=clr;}
      if(el_t){el_t.textContent=sc_ar;el_t.style.color=clr+'aa';}
      if(el_f){el_f.style.width=score+'%';}
    });

    // Attention feed
    const urgent=[...afis.data.filter(a=>a.status==='overdue').map(a=>({
      type:'afi',title:a.title,meta:`${a.afi_number||''} · ${(DIVISIONS[a.business_line]||{}).ar||a.business_line}`,
      sev:'critical',link:'afis'
    }))];
    if(!urgent.length) urgent.push({type:'ok',title:'لا عناصر عاجلة اليوم — استمر!',meta:'منظومة التميز تعمل بشكل جيد',sev:'good'});
    document.getElementById('attnCount').textContent=`${urgent.filter(u=>u.type!='ok').length} عنصر`;
    document.getElementById('attnFeed').innerHTML=urgent.map(u=>`
      <div class="attn-item" ${u.link?`onclick="go('${u.link}')"`:''}> 
        <div class="attn-pulse ${u.sev}"></div>
        <div style="flex:1">
          <div style="font-size:13.5px;font-weight:600">${esc(u.title)}</div>
          <div style="font-size:12px;color:var(--text-2);margin-top:2px">${esc(u.meta)}</div>
        </div>
      </div>`).join('');

    // Pipeline
    const stages=['planning','evidence_collection','assessment','review','approval'];
    const stageLabels={planning:'تخطيط',evidence_collection:'أدلة',assessment:'تقييم',review:'مراجعة',approval:'اعتماد'};
    const stageCounts={};
    assmts.data.forEach(a=>{stageCounts[a.stage]=(stageCounts[a.stage]||0)+1;});
    document.getElementById('pipeline').innerHTML=stages.map(s=>{
      const n=stageCounts[s]||0;
      return `<div class="pip-stage ${n>0?'has-items':''}" onclick="filterByStage('${s}')">
        <span class="pip-count">${n}</span>${stageLabels[s]}
      </div>`;
    }).join('');
    document.getElementById('stageDetail').innerHTML=assmts.data.slice(0,3).map(a=>`
      <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(124,58,237,.08)">
        <span style="font-size:11px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.title)}</span>
        ${stBadge(a.stage)}
        <div style="min-width:60px">${progBar(a.progress||0)}</div>
      </div>`).join('')||'<p class="text-muted text-sm" style="padding-top:8px">لا تقييمات نشطة</p>';

    // KPIs
    document.getElementById('kpiLive').innerHTML=kpis.data.length
      ?kpis.data.map(k=>{
        const pct=k.target?Math.min(100,Math.round((k.actual||0)/k.target*100)):0;
        const clr=k.status==='green'?'#34D399':k.status==='yellow'?'#FCD34D':'#F87171';
        return `<div class="kpi-row" onclick="go('kpis')">
          <div class="kpi-trend">${k.trend==='up'?'↑':k.trend==='down'?'↓':'→'}</div>
          <div class="kpi-name">${esc(App.lang==='ar'?k.name_ar:k.name_en||k.name_ar)}</div>
          <div class="kpi-val" style="color:${clr}">${fmtNum(k.actual)}${k.unit||'%'}</div>
          <div class="kpi-bar-wrap"><div class="prog"><div class="prog-fill" style="width:${pct}%;background:${clr}"></div></div></div>
        </div>`;
      }).join('')

  const title=mval('a_title');if(!title){toast('العنوان مطلوب','error');return;}
  const row={title,description:mval('a_desc')||null,business_line:mval('a_bl'),owner_name:mval('a_owner')||null,priority:mval('a_pri'),due_date:mval('a_due')||null,status:mval('a_status'),root_cause:mval('a_root')||null,corrective_action:mval('a_action')||null};
  try{if(id)await dbUpdate('afis',id,row);else await dbInsert('afis',row);toast('تم الحفظ ✓','success');closeModal();go('afis');}catch(e){toast(e.message,'error');}
};

// ═══ KPIs — full CRUD + history ═══════════════════════════════
reg('kpis',async el=>{
  el.innerHTML=`
    <div class="page-header">
      <div><h1 style="color:#A78BFA">📈 مؤشرات الأداء</h1><div class="sub">قاموس KPI وإدارة الأداء عبر الدوائر</div></div>
      <div class="header-actions"><button class="btn primary" style="background:linear-gradient(135deg,#7C3AED,#9F67F5);border:none" onclick="openAddKPI()">+ KPI جديد</button></div>
    </div>
    <div class="panel">
      <div class="filters"><input class="filter-input" id="kpiQ" placeholder="بحث..."><select class="filter-select" id="kpiSt"><option value="">كل الحالات</option><option value="green">🟢 ضمن الهدف</option><option value="yellow">🟡 تحذير</option><option value="red">🔴 دون الهدف</option></select></div>
      <div id="kpiList">${skeletonRows()}</div>
    </div>`;
  async function load(){
    const listEl=document.getElementById('kpiList'),q=document.getElementById('kpiQ')?.value||'',s=document.getElementById('kpiSt')?.value||'';
    listEl.innerHTML=skeletonRows();
    try{
      const opts={};if(q)opts.ilike=['name_ar',q];if(s)opts.eq={status:s};
      const{data}=await dbList('kpis',opts);
      if(!data.length){listEl.innerHTML=emptyState('لا مؤشرات',`<button class="btn primary sm" onclick="openAddKPI()">+ إضافة KPI</button>`);return;}
      listEl.innerHTML=`<div class="tbl-wrap"><table>
        <thead><tr><th>المؤشر</th><th>الوحدة</th><th>الهدف</th><th>الفعلي</th><th>الإنجاز</th><th>الاتجاه</th><th>الحالة</th><th>المالك</th><th></th></tr></thead>
        <tbody>${data.map(k=>{
          const pct=k.target?Math.min(100,Math.round((k.actual||0)/k.target*100)):0;
          const clr=k.status==='green'?'#34D399':k.status==='yellow'?'#FCD34D':'#F87171';
          return `<tr>
            <td style="font-weight:600">${esc(App.lang==='ar'?k.name_ar:k.name_en||k.name_ar)}</td>
            <td class="font-mono text-xs">${esc(k.unit||'%')}</td>
            <td class="font-mono">${fmtNum(k.target)}</td>
            <td class="font-mono" style="font-weight:700;color:${clr}">${fmtNum(k.actual)}</td>
            <td><div style="display:flex;align-items:center;gap:6px">${progBar(pct)}<span class="font-mono text-xs">${pct}%</span></div></td>
            <td style="font-size:18px;color:${k.trend==='up'?'#34D399':k.trend==='down'?'#F87171':'#94A3B8'}">${k.trend==='up'?'↑':k.trend==='down'?'↓':'→'}</td>
            <td><span class="badge ${k.status==='green'?'badge-green':k.status==='yellow'?'badge-yellow':'badge-red'}">${k.status==='green'?'ضمن الهدف':k.status==='yellow'?'تحذير':'دون الهدف'}</span></td>
            <td class="text-sm text-muted">${esc(k.owner_name||'—')}</td>
            <td><div class="tbl-actions"><button class="btn sm" onclick="openEditKPI('${k.id}')">تعديل</button><button class="btn sm" onclick="openKPIHist('${k.id}','${esc(k.name_ar)}')">السجل</button></div></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }catch(e){listEl.innerHTML=`<div style="padding:20px;color:var(--danger)">${e.message}</div>`;}
  }
  document.getElementById('kpiQ')?.addEventListener('input',()=>setTimeout(load,300));
  document.getElementById('kpiSt')?.addEventListener('change',load);
  load();
});
function kpiForm(r={}){return `
  <div class="modal-head"><h3 style="color:#A78BFA">${r.id?'تعديل KPI':'مؤشر أداء جديد'}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div class="form-grid">
      <div class="field"><label>الاسم بالعربية</label><input id="k_ar" value="${esc(r.name_ar||'')}"></div>
      <div class="field"><label>الاسم بالإنجليزية</label><input id="k_en" value="${esc(r.name_en||'')}"></div>
      <div class="field form-full"><label>التعريف والصيغة</label><textarea id="k_def">${esc(r.definition||'')}</textarea></div>
      <div class="field"><label>وحدة القياس</label><input id="k_unit" value="${esc(r.unit||'%')}"></div>
      <div class="field"><label>الهدف</label><input type="number" id="k_target" value="${r.target||''}"></div>
      <div class="field"><label>القيمة الفعلية</label><input type="number" id="k_actual" value="${r.actual||''}"></div>
      <div class="field"><label>قطاع الأعمال</label><select id="k_bl">${Object.entries(DIVISIONS).map(([k,v])=>`<option value="${k}" ${r.business_line===k?'selected':''}>${App.lang==='ar'?v.ar:v.en}</option>`).join('')}</select></div>
      <div class="field"><label>المالك</label><input id="k_owner" value="${esc(r.owner_name||'')}"></div>
      <div class="field"><label>الاتجاه</label><select id="k_trend"><option value="up" ${r.trend==='up'?'selected':''}>↑ صاعد</option><option value="down" ${r.trend==='down'?'selected':''}>↓ هابط</option><option value="stable" ${r.trend==='stable'?'selected':''}>→ مستقر</option></select></div>
      <div class="field"><label>الحالة</label><select id="k_status"><option value="green" ${r.status==='green'?'selected':''}>🟢 ضمن الهدف</option><option value="yellow" ${r.status==='yellow'?'selected':''}>🟡 تحذير</option><option value="red" ${r.status==='red'?'selected':''}>🔴 دون الهدف</option></select></div>
    </div>
  </div>
  <div class="modal-foot"><button class="btn" onclick="closeModal()">إلغاء</button><button class="btn primary" style="background:linear-gradient(135deg,#7C3AED,#9F67F5);border:none" onclick="saveKPI('${r.id||''}')">حفظ</button></div>`;}
window.openAddKPI=()=>openModal(kpiForm(),'wide');
window.openEditKPI=async id=>{const r=await dbGet('kpis',id);openModal(kpiForm(r),'wide');};
window.saveKPI=async id=>{
  const name=mval('k_ar');if(!name){toast('الاسم مطلوب','error');return;}
  const row={name_ar:name,name_en:mval('k_en')||null,definition:mval('k_def')||null,unit:mval('k_unit')||'%',target:parseFloat(mval('k_target'))||null,actual:parseFloat(mval('k_actual'))||null,business_line:mval('k_bl'),owner_name:mval('k_owner')||null,trend:mval('k_trend'),status:mval('k_status'),last_updated:new Date().toISOString()};
  try{if(id)await dbUpdate('kpis',id,row);else await dbInsert('kpis',row);toast('تم الحفظ ✓','success');closeModal();go('kpis');}catch(e){toast(e.message,'error');}
};
window.openKPIHist=async(id,name)=>{
  const{data:hist}=await dbList('kpi_history',{eq:{kpi_id:id}});
  openModal(`<div class="modal-head"><h3 style="color:#A78BFA">📊 سجل — ${esc(name)}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="hPeriod" placeholder="الفترة (مثال: 2026-Q2)" class="filter-input">
        <input type="number" id="hActual" placeholder="القيمة" class="filter-input" style="min-width:100px">
        <button class="btn primary sm" style="background:linear-gradient(135deg,#7C3AED,#9F67F5);border:none" onclick="addKPIHist('${id}','${name}')">إضافة</button>
      </div>
      ${hist.length?`<div class="tbl-wrap"><table><thead><tr><th>الفترة</th><th>الهدف</th><th>الفعلي</th><th>الحالة</th></tr></thead><tbody>${hist.map(h=>`<tr><td class="font-mono">${esc(h.period)}</td><td class="font-mono">${fmtNum(h.target)}</td><td class="font-mono">${fmtNum(h.actual)}</td><td>${stBadge(h.status||'open')}</td></tr>`).join('')}</tbody></table></div>`:emptyState('لا سجلات')}
    </div>`);
};
window.addKPIHist=async(kpiId,kpiName)=>{
  const period=document.getElementById('hPeriod')?.value?.trim();
  const actual=parseFloat(document.getElementById('hActual')?.value||'');
  if(!period){toast('الفترة مطلوبة','error');return;}
  await dbInsert('kpi_history',{kpi_id:kpiId,period,actual});
  const kpi=await dbGet('kpis',kpiId);
  await dbUpdate('kpis',kpiId,{actual,last_updated:new Date().toISOString()});
  toast('تم التحديث','success');openKPIHist(kpiId,kpiName);
};

window.openNotifs=async()=>{
  const{data}=await dbList('notifications',{eq:{user_id:App.profile?.id,is_read:false},limit:10});
