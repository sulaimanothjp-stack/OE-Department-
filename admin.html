<!DOCTYPE html>
<html lang="ar" dir="rtl" id="root">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SE · Admin</title>
<link rel="stylesheet" href="styles.css">
<style>
:root{--DC:#4F46E5;--DR:79,70,229}
body{background:#020912}
.ni.on{color:#818CF8;background:rgba(79,70,229,.13)}.ni.on::after{background:#4F46E5}
.tb-ttl{color:#818CF8!important}.clk .ct{color:#4F46E5!important}
.ld .d{background:#4F46E5;color:#4F46E5;box-shadow:0 0 6px #4F46E5}
.uc{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(79,70,229,.07);transition:.13s}
.uc:hover{background:rgba(79,70,229,.04)}.uc:last-child{border-bottom:none}
.uc-av{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.uc-nm{font-size:13.5px;font-weight:600}.uc-rl{font-family:var(--mono);font-size:10.5px;color:var(--t2);margin-top:1px}
.uc-bg{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.creds-box{background:#070F1D;border:1px solid rgba(79,70,229,.25);border-radius:var(--rs);padding:14px;font-family:var(--mono)}
.cl{font-size:9.5px;color:var(--t3);letter-spacing:.06em;margin-bottom:3px}
.cv{font-size:13px;font-weight:700;color:#818CF8;background:#0A1828;padding:6px 10px;border-radius:var(--rs);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;word-break:break-all}
.cv-val{flex:1}
.cb{padding:2px 8px;border-radius:5px;background:rgba(79,70,229,.2);border:1px solid rgba(79,70,229,.3);color:#818CF8;cursor:pointer;font-family:var(--mono);font-size:10px;flex-shrink:0;white-space:nowrap}
.skn{background:rgba(79,70,229,.08);border:1px solid rgba(79,70,229,.2);border-radius:var(--rs);padding:10px 12px;font-size:12.5px;color:#818CF8;margin-bottom:14px;line-height:1.6}
</style>
</head>
<body>
<div class="shell">
<aside class="sb">
  <div class="sb-brand"><div id="lgEl"></div><div><div class="sb-t1" style="color:#4F46E5">se</div><div class="sb-t2">System Admin</div></div></div>
  <div id="ubEl" class="ub"></div>
  <nav class="nav" id="navEl"></nav>
  <div class="sb-foot"><button class="btn-lo" onclick="doLogout()">🚪 خروج</button><button class="btn-lg" onclick="toggleLang()">EN/ع</button></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="tb-ttl fhud" id="pgtitle" style="color:#818CF8">لوحة الأدمن</div>
    <div class="tb-r">
      <div class="clk"><div class="ct" id="ct"></div><div id="cd" style="font-family:var(--mono);font-size:9.5px;color:var(--t3)"></div></div>
      <div class="ld"><div class="d"></div><span style="color:#4F46E544;font-family:var(--mono);font-size:11px">ADMIN</span></div>
    </div>
  </div>
  <div class="page" id="pgContent"></div>
</div>
</div>
<div id="tc"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
<script>
const RLA = {admin:'مشرف النظام',director:'مدير الإدارة',governance_manager:'مدير الحوكمة',generation_manager:'مدير التوليد',national_grid_manager:'مدير النقل',distribution_manager:'مدير التوزيع',technical_alerts_manager:'مدير التنبيهات',employee:'موظف'};
const RCL = {admin:'rgba(239,68,68,.15)',director:'rgba(212,175,55,.12)',governance_manager:'rgba(124,58,237,.15)',generation_manager:'rgba(245,158,11,.12)',national_grid_manager:'rgba(14,165,233,.12)',distribution_manager:'rgba(16,185,129,.12)',technical_alerts_manager:'rgba(239,68,68,.12)',employee:'rgba(30,58,88,.5)'};
const RCO = {admin:'#FCA5A5',director:'#FDE68A',governance_manager:'#C4B5FD',generation_manager:'#FDE68A',national_grid_manager:'#BAE6FD',distribution_manager:'#A7F3D0',technical_alerts_manager:'#FCA5A5',employee:'var(--t2)'};

const NAV = [
  {k:'users',    ar:'إدارة المستخدمين', en:'Users',     ic:'👥', fn:"go('users')"},
  {k:'divs',     ar:'الدوائر',          en:'Divisions', ic:'🏛️', fn:"go('divs')"},
  {k:'settings', ar:'الإعدادات',        en:'Settings',  ic:'⚙️', fn:"go('settings')"},
  {k:'health',   ar:'صحة النظام',       en:'Health',    ic:'💡', fn:"go('health')"},
];
const PAGES={};
function reg(k,fn){PAGES[k]=fn;}
function go(k){
  const item=NAV.find(n=>n.k===k);
  document.getElementById('pgtitle').textContent=item?(App.lang==='ar'?item.ar:item.en):k;
  buildNav(NAV,k);
  const ct=document.getElementById('pgContent');
  ct.innerHTML='<div class="fade" id="pg"></div>';
  (PAGES[k]||function(el){el.innerHTML='<p style="padding:40px;color:var(--t3)">قيد البناء…</p>';})(document.getElementById('pg'));
}

/* ═══ USERS ════════════════════════════════════════════════ */
reg('users',async el=>{
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div>
        <h1 style="font-family:var(--hud);font-size:19px;color:#818CF8">👥 إدارة المستخدمين</h1>
        <div style="font-size:12.5px;color:var(--t2)">أنشئ الحسابات · اضبط الأدوار · أعطِ بيانات الدخول</div>
      </div>
      <button class="btn" onclick="openCU()" style="background:linear-gradient(135deg,#4F46E5,#818CF8);border:none;color:#fff">+ إنشاء مستخدم</button>
    </div>
    <div class="skn">ℹ️ أنشئ المستخدم ← ستظهر بيانات الدخول تلقائياً ← أعطها للمستخدم ← يسجّل دخول ويغيّر كلمة المرور</div>
    <div class="g4 mb2" id="uStats">${skR()}</div>
    <div class="panel" style="border-color:rgba(79,70,229,.15)">
      <div class="filters">
        <input class="fi" id="uq" placeholder="بحث بالاسم...">
        <select class="fi" id="ur">
          <option value="">كل الأدوار</option>
          ${Object.entries(RLA).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
        </select>
      </div>
      <div id="uList">${skR()}</div>
    </div>`;

  async function load(){
    const el2=document.getElementById('uList');
    const q=(document.getElementById('uq')?.value||'').toLowerCase();
    const r=document.getElementById('ur')?.value||'';
    el2.innerHTML=skR();
    try{
      const opts={}; if(r) opts.eq={role:r};
      const{data}=await dbList('profiles',opts);
      const fl=q?data.filter(u=>(u.full_name||'').toLowerCase().includes(q)):data;
      const stEl=document.getElementById('uStats');
      if(stEl) stEl.innerHTML=[
        {sl:'الكل',sv:fl.length},{sl:'مدراء',sv:fl.filter(u=>u.role?.includes('manager')||u.role==='director').length},
        {sl:'موظفون',sv:fl.filter(u=>u.role==='employee').length},{sl:'نشطون',sv:fl.filter(u=>u.is_active).length,cl:'grn'},
      ].map(s=>`<div class="sc"><div class="sl">${s.sl}</div><div class="sv ${s.cl||''}">${s.sv}</div></div>`).join('');
      if(!fl.length){el2.innerHTML=emptyEl('لا مستخدمين',`<button class="btn sm" onclick="openCU()">+ إنشاء</button>`);return;}
      el2.innerHTML=fl.map(u=>{
        const init=(u.full_name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        const clr=RCO[u.role]||'var(--t2)';
        return`<div class="uc">
          <div class="uc-av" style="background:${RCL[u.role]||'var(--bg3)'};color:${clr}">${init}</div>
          <div style="flex:1;min-width:0">
            <div class="uc-nm">${esc(u.full_name||'—')}</div>
            <div class="uc-rl">${esc(u.full_name_en||'—')}</div>
            <div class="uc-bg">
              <span class="badge" style="background:${RCL[u.role]};border:1px solid ${clr}33;color:${clr};font-size:10px">${RLA[u.role]||u.role}</span>
              ${u.division?`<span class="badge bg" style="font-size:10px">${DIVS[u.division]?.icon||''} ${DIVS[u.division]?.ar||u.division}</span>`:''}
              <span style="display:inline-flex;align-items:center;gap:3px">
                <div style="width:6px;height:6px;border-radius:50%;background:${u.is_active?'var(--success)':'var(--t3)'}"></div>
                <span style="font-size:10px;color:var(--t3)">${u.is_active?'نشط':'معطّل'}</span>
              </span>
            </div>
          </div>
          <div class="ta">
            <button class="btn sm" onclick="openEU('${u.id}')">تعديل</button>
            <button class="btn sm" onclick="openUCreds('${u.id}')">🔑 بيانات الدخول</button>
            <button class="btn sm d" onclick="toggleU('${u.id}',${u.is_active})">${u.is_active?'تعطيل':'تفعيل'}</button>
          </div>
        </div>`;
      }).join('');
    }catch(e){el2.innerHTML=`<div style="padding:18px;color:var(--danger)">${e.message}</div>`;}
  }
  ['uq','ur'].forEach(id=>{document.getElementById(id)?.addEventListener('input',()=>setTimeout(load,300));document.getElementById(id)?.addEventListener('change',load);});
  load(); window._rlu=load;
});

/* ═══ CREATE USER ═══════════════════════════════════════════ */
window.openCU=()=>{
  openModal(`
    <div class="mh"><h3 style="color:#818CF8">👤 إنشاء مستخدم جديد</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <div class="skn">سيُنشأ الحساب في Supabase تلقائياً. احفظ بيانات الدخول وأعطها للمستخدم.</div>
      <div class="fg">
        <div class="field"><label>الاسم الكامل (عربي) *</label><input id="nu_n" placeholder="سليمان الخطيب"></div>
        <div class="field"><label>الاسم (إنجليزي)</label><input id="nu_ne" placeholder="Sulaiman Alkhateeb"></div>
        <div class="field ff"><label>البريد الإلكتروني *</label><input type="email" id="nu_em" placeholder="name@se.com.sa"></div>
        <div class="field ff">
          <label>كلمة المرور المؤقتة *</label>
          <div style="display:flex;gap:7px">
            <input type="text" id="nu_pw" placeholder="اكتب أو اضغط توليد">
            <button class="btn sm" onclick="genPW()" style="flex-shrink:0">🔀 توليد</button>
          </div>
        </div>
        <div class="field">
          <label>الدور *</label>
          <select id="nu_rl" onchange="handleRC()">
            <option value="">اختر الدور</option>
            ${Object.entries(RLA).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
          </select>
        </div>
        <div class="field" id="nu_divF" style="display:none">
          <label>الدائرة</label>
          <select id="nu_dv">
            <option value="">—</option>
            ${Object.entries(DIVS).map(([k,v])=>`<option value="${k}">${v.icon} ${v.ar}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>المسمى الوظيفي (عربي)</label><input id="nu_tt" placeholder="مدير دائرة..."></div>
        <div class="field"><label>المسمى الوظيفي (إنجليزي)</label><input id="nu_te" placeholder="Manager..."></div>
      </div>
    </div>
    <div class="mf">
      <button class="btn" onclick="closeModal()">إلغاء</button>
      <button class="btn" id="createBtn" onclick="createUser()" style="background:linear-gradient(135deg,#4F46E5,#818CF8);border:none;color:#fff">إنشاء الحساب</button>
    </div>`,'w');
  genPW();
};

window.handleRC=()=>{
  const r=mv('nu_rl');
  const needDiv=['governance_manager','generation_manager','national_grid_manager','distribution_manager','technical_alerts_manager','employee'].includes(r);
  const divF=document.getElementById('nu_divF');
  if(divF) divF.style.display=needDiv?'block':'none';
  const divMap={governance_manager:'governance',generation_manager:'generation',national_grid_manager:'national_grid',distribution_manager:'distribution',technical_alerts_manager:'technical_alerts'};
  const autoDiv=divMap[r];
  if(autoDiv){const d=document.getElementById('nu_dv');if(d)d.value=autoDiv;}
};

window.genPW=()=>{
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789@#$!';
  let p=''; for(let i=0;i<10;i++) p+=ch[Math.floor(Math.random()*ch.length)];
  const el=document.getElementById('nu_pw'); if(el){el.value=p; navigator.clipboard?.writeText(p).catch(()=>{});}
};

window.createUser=async()=>{
  const name=mv('nu_n'),email=mv('nu_em'),pass=mv('nu_pw'),role=mv('nu_rl');
  if(!name||!email||!pass||!role){toast('يرجى تعبئة الحقول المطلوبة','e');return;}
  const btn=document.getElementById('createBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> جارٍ الإنشاء...';}
  try{
    const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name,role},emailRedirectTo:window.location.origin}});
    if(error) throw error;
    const uid=data.user?.id;
    if(uid){
      await sb.from('profiles').update({full_name:name,full_name_en:mv('nu_ne')||null,role,division:mv('nu_dv')||null,job_title:mv('nu_tt')||null,job_title_en:mv('nu_te')||null,is_active:true}).eq('id',uid);
    }
    closeModal();
    showCreds(name,email,pass,RLA[role]||role);
    window._rlu?.();
  }catch(e){
    if(btn){btn.disabled=false;btn.innerHTML='إنشاء الحساب';}
    if(e.message?.includes('already')){toast('هذا الإيميل مسجّل مسبقاً','e');}
    else{closeModal();showManual(name,email,pass,role);}
  }
};

function showCreds(name,email,pass,role){
  openModal(`
    <div class="mh"><h3 style="color:var(--success)">✓ تم إنشاء الحساب بنجاح!</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <p style="font-size:13px;color:var(--t2);margin-bottom:12px">أعطِ هذه البيانات للمستخدم وطلب منه تغيير كلمة المرور.</p>
      <div class="creds-box">
        <div class="cl">الاسم</div>
        <div class="cv"><span class="cv-val">${esc(name)}</span></div>
        <div class="cl">الدور</div>
        <div class="cv"><span class="cv-val">${esc(role)}</span></div>
        <div class="cl">رابط الدخول</div>
        <div class="cv"><span class="cv-val">https://sulaimanothjp-stack.github.io/OE-Department-/index.html</span><button class="cb" onclick="copyT('https://sulaimanothjp-stack.github.io/OE-Department-/index.html')">نسخ</button></div>
        <div class="cl">البريد الإلكتروني (اسم المستخدم)</div>
        <div class="cv"><span class="cv-val">${esc(email)}</span><button class="cb" onclick="copyT('${esc(email)}')">نسخ</button></div>
        <div class="cl">كلمة المرور المؤقتة</div>
        <div class="cv"><span class="cv-val">${esc(pass)}</span><button class="cb" onclick="copyT('${esc(pass)}')">نسخ</button></div>
      </div>
      <div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:var(--rs);padding:9px 12px;font-size:12.5px;color:var(--warning);margin-top:10px">
        ⚠️ يجب على المستخدم تغيير كلمة المرور عند أول تسجيل دخول
      </div>
    </div>
    <div class="mf">
      <button class="btn" onclick="printCreds('${esc(name)}','${esc(email)}','${esc(pass)}','${esc(role)}')">🖨️ طباعة</button>
      <button class="btn" onclick="closeModal()" style="background:linear-gradient(135deg,#4F46E5,#818CF8);border:none;color:#fff">تم</button>
    </div>`,'w');
}

function showManual(name,email,pass,role){
  openModal(`
    <div class="mh"><h3 style="color:var(--warning)">⚠️ أنشئ المستخدم يدوياً في Supabase</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <p style="font-size:13px;color:var(--t2);margin-bottom:12px">الإنشاء التلقائي يحتاج تعطيل تأكيد الإيميل. اتبع هذه الخطوات:</p>
      <ol style="font-size:12.5px;line-height:2;padding-right:18px;color:var(--t2)">
        <li>روح <strong style="color:#818CF8">Supabase → Authentication → Users → Add user</strong></li>
        <li>أدخل الإيميل وكلمة المرور أدناه</li>
        <li>روح <strong style="color:#818CF8">Table Editor → profiles</strong> وعدّل: role، division، full_name</li>
      </ol>
      <div class="creds-box" style="margin-top:12px">
        <div class="cl">الاسم</div><div class="cv"><span class="cv-val">${esc(name)}</span></div>
        <div class="cl">الدور (للجدول)</div><div class="cv"><span class="cv-val">${esc(RLA[role]||role)} / ${role}</span></div>
        <div class="cl">البريد الإلكتروني</div><div class="cv"><span class="cv-val">${esc(email)}</span><button class="cb" onclick="copyT('${esc(email)}')">نسخ</button></div>
        <div class="cl">كلمة المرور</div><div class="cv"><span class="cv-val">${esc(pass)}</span><button class="cb" onclick="copyT('${esc(pass)}')">نسخ</button></div>
      </div>
      <div style="background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:var(--rs);padding:9px 12px;font-size:12px;color:#818CF8;margin-top:10px">
        💡 لتفادي هذا: Supabase → Auth → Settings → <strong>Disable email confirmations</strong>
      </div>
    </div>
    <div class="mf">
      <button class="btn" onclick="window.open('https://supabase.com/dashboard/project/ekywcrlcjgbjtwnjozov/auth/users','_blank')">🔗 فتح Supabase</button>
      <button class="btn" onclick="closeModal()">فهمت</button>
    </div>`,'w');
}

window.openUCreds=async id=>{
  const u=await dbGet('profiles',id).catch(()=>null); if(!u) return;
  openModal(`
    <div class="mh"><h3 style="color:#818CF8">🔑 بيانات دخول — ${esc(u.full_name||'')}</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <div class="creds-box">
        <div class="cl">الاسم</div><div class="cv"><span class="cv-val">${esc(u.full_name||'—')}</span></div>
        <div class="cl">الدور</div><div class="cv"><span class="cv-val">${RLA[u.role]||u.role}</span></div>
        <div class="cl">رابط الدخول</div>
        <div class="cv"><span class="cv-val">https://sulaimanothjp-stack.github.io/OE-Department-/index.html</span><button class="cb" onclick="copyT('https://sulaimanothjp-stack.github.io/OE-Department-/index.html')">نسخ</button></div>
        <div class="cl">الإيميل / اسم المستخدم</div>
        <div class="cv"><span class="cv-val">مشاهدته من Supabase → Auth → Users</span><button class="cb" onclick="window.open('https://supabase.com/dashboard/project/ekywcrlcjgbjtwnjozov/auth/users','_blank')">فتح</button></div>
      </div>
    </div>
    <div class="mf"><button class="btn" onclick="closeModal()">إغلاق</button></div>`);
};

window.openEU=async id=>{
  const u=await dbGet('profiles',id).catch(()=>null); if(!u) return;
  openModal(`
    <div class="mh"><h3>تعديل — ${esc(u.full_name||'')}</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <div class="fg">
        <div class="field"><label>الاسم (عربي)</label><input id="eu_n" value="${esc(u.full_name||'')}"></div>
        <div class="field"><label>الاسم (إنجليزي)</label><input id="eu_ne" value="${esc(u.full_name_en||'')}"></div>
        <div class="field"><label>الدور</label>
          <select id="eu_rl">${Object.entries(RLA).map(([k,v])=>`<option value="${k}" ${u.role===k?'selected':''}>${v}</option>`).join('')}</select>
        </div>
        <div class="field"><label>الدائرة</label>
          <select id="eu_dv"><option value="">—</option>${Object.entries(DIVS).map(([k,v])=>`<option value="${k}" ${u.division===k?'selected':''}>${v.icon} ${v.ar}</option>`).join('')}</select>
        </div>
        <div class="field"><label>المسمى (عربي)</label><input id="eu_tt" value="${esc(u.job_title||'')}"></div>
        <div class="field"><label>المسمى (إنجليزي)</label><input id="eu_te" value="${esc(u.job_title_en||'')}"></div>
      </div>
    </div>
    <div class="mf"><button class="btn" onclick="closeModal()">إلغاء</button><button class="btn" onclick="saveEU('${id}')" style="background:linear-gradient(135deg,#4F46E5,#818CF8);border:none;color:#fff">حفظ</button></div>`,'w');
};
window.saveEU=async id=>{
  try{
    await sb.from('profiles').update({full_name:mv('eu_n'),full_name_en:mv('eu_ne')||null,role:mv('eu_rl'),division:mv('eu_dv')||null,job_title:mv('eu_tt')||null,job_title_en:mv('eu_te')||null}).eq('id',id);
    toast('تم الحفظ ✓','s'); closeModal(); window._rlu?.();
  }catch(e){toast(e.message,'e');}
};
window.toggleU=async(id,active)=>{
  await sb.from('profiles').update({is_active:!active}).eq('id',id);
  toast(active?'تم التعطيل':'تم التفعيل','s'); window._rlu?.();
};

window.testSB=async()=>{
  const el=document.getElementById('sbSt'); if(!el) return;
  el.textContent='جارٍ الفحص...'; el.style.color='var(--t2)';
  try{
    const{error}=await sb.from('profiles').select('id',{count:'exact',head:true});
    if(error) throw error;
    el.innerHTML='<span style="color:var(--success)">✓ متصل — قاعدة البيانات تعمل بشكل ممتاز</span>';
  }catch(e){ el.innerHTML=`<span style="color:var(--danger)">✕ خطأ: ${e.message}</span>`; }
};
