<!DOCTYPE html>
<html lang="ar" dir="rtl" id="root">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SE · بوابة الموظف</title>
<link rel="stylesheet" href="styles.css">
<style>
:root{--DC:#6366F1;--DR:99,102,241}
body{background:#020912}
.ni.on{color:#818CF8;background:rgba(99,102,241,.13)}
.ni.on::after{background:#6366F1}
.tb-ttl{color:#818CF8!important}.clk .ct{color:#6366F1!important}
.ld .d{background:#6366F1;color:#6366F1;box-shadow:0 0 6px #6366F1}
/* greeting */
.greet-card{position:relative;overflow:hidden;background:linear-gradient(135deg,#6366F108,#020912);border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:20px 24px;margin-bottom:16px}
#gcv{position:absolute;inset:0;z-index:0}
.gc-inner{position:relative;z-index:1}
.gc-inner h1{font-family:var(--hud);font-size:20px;font-weight:700;color:#fff;margin-bottom:3px}
.gc-inner .gs{font-size:12.5px;color:rgba(99,102,241,.6)}
.greet-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#6366F1,#818CF8,#6366F1,transparent);animation:sba 4s linear infinite;background-size:200%}
@keyframes sba{0%{background-position:200%}100%{background-position:-200%}}
/* priority blocks */
.pb{border-radius:var(--r);padding:14px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.pb:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.pb .pbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;margin-bottom:6px;text-transform:uppercase}
.pb .pbv{font-family:var(--hud);font-size:34px;font-weight:700;line-height:1}
.pb .pbs{font-size:11.5px;opacity:.7;margin-top:3px}
</style>
</head>
<body>
<div class="shell">
<aside class="sb">
  <div class="sb-brand">
    <div id="lgEl"></div>
    <div><div class="sb-t1" style="color:#6366F1">se</div><div class="sb-t2">بوابة الموظف</div></div>
  </div>
  <div id="ubEl" class="ub"></div>
  <nav class="nav" id="navEl"></nav>
  <div class="sb-foot">
    <button class="btn-lo" onclick="doLogout()">🚪 خروج</button>
    <button class="btn-lg" onclick="toggleLang()">EN/ع</button>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="tb-ttl fhud" id="pgtitle">يومي</div>
    <div class="tb-r">
      <div class="clk"><div class="ct" id="ct"></div><div id="cd" style="font-family:var(--mono);font-size:9.5px;color:var(--t3)"></div></div>
      <button class="nbtn" onclick="openNotifs()">🔔<span class="ndot" id="ndot" style="display:none"></span></button>
    </div>
  </div>
  <div class="page" id="pgContent"></div>
</div>
</div>
<div id="tc"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
<script>
const NAV=[
  {k:'myday',  ar:'يومي',                   en:'My Day',         ic:'☀️',fn:"go('myday')"},
  {k:'tasks',  ar:'مهامي',                  en:'My Tasks',       ic:'✓',fn:"go('tasks')"},
  {k:'done',   ar:'المُنجزة',               en:'Completed',      ic:'✅',fn:"go('done')"},
  {g:'البيانات',ge:'DATA'},
  {k:'afis',   ar:'AFIs المكلّف بها',        en:'My AFIs',        ic:'▲',fn:"go('afis')"},
  {k:'tickets',ar:'تذاكري',                 en:'My Tickets',     ic:'🎫',fn:"go('tickets')"},
  {g:'اليوم',ge:'TODAY'},
  {k:'update', ar:'تحديث نهاية اليوم',      en:'Daily Update',   ic:'📝',fn:"go('update')"},
  {k:'signals',ar:'مؤشراتي',               en:'My Signals',     ic:'⭐',fn:"go('signals')"},
];
const PAGES={};
function reg(k,fn){PAGES[k]=fn;}
function go(k){
  const item=NAV.find(n=>n.k===k);
  document.getElementById('pgtitle').textContent=item?(App.lang==='ar'?item.ar:item.en):k;
  buildNav(NAV,k);
  const ct=document.getElementById('pgContent');ct.innerHTML='<div class="fade" id="pg"></div>';
  (PAGES[k]||function(el){el.innerHTML='<p style="padding:40px;color:var(--t3)">قيد البناء…</p>';})(document.getElementById('pg'));
}

reg('myday',async el=>{
  const p=App.profile,h=new Date().getHours();
  const greet=h<12?'صباح الخير':h<17?'مساء الخير':'مساء النور';
  const phase=h<9?'ابدأ يومك — راجع أولوياتك':h<12?'ركّز على مهامك العاجلة':h<15?'منتصف اليوم — تابع تقدمك':h<17?'أنجز ما تستطيع قبل المساء':'وقت الإغلاق — لخّص يومك';
  el.innerHTML=`
    <div class="greet-card">
      <canvas id="gcv"></canvas>
      <div class="gc-inner">
        <h1>${h<12?'🌅':h<17?'🌆':'🌙'} ${greet}، ${esc(p?.full_name||'')}</h1>
        <div class="gs">${phase} · ${new Date().toLocaleDateString(App.lang==='ar'?'ar-SA':'en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
      </div>
      <div class="greet-bar"></div>
    </div>
    <div class="g4 mb2" id="empStats">${skR()}</div>
    <div class="g2 mb2">
      <div class="panel">
        <div class="ph" style="border-color:rgba(239,68,68,.15)">
          <h3 style="color:#F87171">🔴 متأخرة — يحتاج إجراء فوري</h3>
        </div>
        <div id="overdueP">${skR(3)}</div>
      </div>
      <div class="panel">
        <div class="ph" style="border-color:rgba(99,102,241,.15)">
          <h3 style="color:#818CF8">🟡 أولويات اليوم</h3>
        </div>
        <div id="priorP">${skR(3)}</div>
      </div>
    </div>
    <div class="panel" style="border-color:rgba(99,102,241,.15)">
      <div class="ph" style="border-color:rgba(99,102,241,.12)"><h3 style="color:#818CF8">📝 تحديث نهاية اليوم</h3></div>
      <div class="pb" style="padding:14px 16px">
        <div class="fg">
          <div class="field"><label>ماذا أنجزت اليوم؟</label><textarea id="d_done" rows="3" placeholder="اكتب إنجازاتك..."></textarea></div>
          <div class="field"><label>هل هناك عوائق؟</label><textarea id="d_blk" rows="3" placeholder="أي تعطل أو مشاكل..."></textarea></div>
        </div>
        <div class="field"><label>أولويات الغد</label><textarea id="d_nxt" rows="2" placeholder="أهم ما ستبدأ به غداً..."></textarea></div>
        <button class="btn" onclick="saveDU()" style="background:linear-gradient(135deg,#6366F1,#818CF8);border:none;color:#fff">📤 حفظ التحديث</button>
      </div>
    </div>`;

  initCanvas('gcv','net','#6366F1');

  try{
    const uid=p?.id;
    const[oT,odT,oTkt,oAfi]=await Promise.all([
      dbCnt('tasks',{eq:{assigned_to:uid},in:{status:['new','open','in_progress']}}),
      dbCnt('tasks',{eq:{assigned_to:uid,status:'overdue'}}),
      dbCnt('tickets',{eq:{from_user:uid},neq:{status:'closed'}}),
      dbCnt('afis',{eq:{owner_id:uid},neq:{status:'closed'}}),
    ]);
    document.getElementById('empStats').innerHTML=[
      {sl:'مهام مفتوحة',sv:oT,cl:'',onClick:"go('tasks')"},
      {sl:'مهام متأخرة',sv:odT,cl:odT?'red':'grn',onClick:"go('tasks')"},
      {sl:'تذاكر',sv:oTkt,cl:'',onClick:"go('tickets')"},
      {sl:'AFIs',sv:oAfi,cl:'',onClick:"go('afis')"},
    ].map(s=>`<div class="sc ptr" onclick="${s.onClick}"><div class="sl">${s.sl}</div><div class="sv ${s.cl}">${s.sv}</div></div>`).join('');

    const{data:od}=await dbList('tasks',{eq:{assigned_to:uid,status:'overdue'},lim:4});
    document.getElementById('overdueP').innerHTML=od.length
      ?od.map(tk=>`<div class="tr2" onclick="openTU('${tk.id}')">
          <div class="tck">!</div>
          <div style="flex:1"><div class="tt">${esc(tk.title)}</div>
            <div class="tm2">${priBadge(tk.priority)}<span style="color:var(--danger)">${fmtD(tk.due_date)}</span>${stBadge(tk.status)}</div>
          </div>
          <button class="btn sm" style="background:linear-gradient(135deg,#6366F1,#818CF8);border:none;color:#fff">تحديث</button>
        </div>`).join('')
      :`<div style="padding:14px;text-align:center;color:var(--success);font-size:13px">✓ لا مهام متأخرة — ممتاز!</div>`;

    const{data:pri}=await dbList('tasks',{eq:{assigned_to:uid},in:{priority:['high','critical'],status:['new','open','in_progress']},lim:4});
    document.getElementById('priorP').innerHTML=pri.length
      ?pri.map(tk=>`<div class="tr2" onclick="openTU('${tk.id}')">
          <div class="tck"></div>
          <div style="flex:1"><div class="tt">${esc(tk.title)}</div>
            <div class="tm2">${priBadge(tk.priority)}<span>استحقاق: ${fmtD(tk.due_date)}</span></div>
          </div>
        </div>`).join('')
      :`<div style="padding:14px;text-align:center;color:var(--t2);font-size:13px">لا مهام عاجلة اليوم</div>`;
  }catch(e){toast(e.message,'e');}
});
window.saveDU=async()=>{await logAct('employee_daily_update',null,null,{done:mv('d_done'),block:mv('d_blk'),next:mv('d_nxt')});toast('تم حفظ التحديث ✓','s');};

/* My Tasks — with status update */
reg('tasks',async el=>{
  el.innerHTML=`
    <div style="margin-bottom:14px"><h1 style="font-family:var(--hud);font-size:19px;color:#818CF8">✓ مهامي</h1>
    <div style="font-size:12.5px;color:var(--t2)">كل المهام المكلّف بها — حدّث حالتها مباشرة</div></div>
    <div class="panel" style="border-color:rgba(99,102,241,.15)">
      <div class="filters">
        <input class="fi" id="tq" placeholder="بحث...">
        <select class="fi" id="tst">
          <option value="">كل الحالات</option>
          <option value="new">جديد</option><option value="open">مفتوح</option>
          <option value="in_progress">قيد التنفيذ</option><option value="pending_review">بانتظار المراجعة</option>
          <option value="overdue">متأخر</option>
        </select>
      </div>
      <div id="myTaskList">${skR()}</div>
    </div>`;
  async function load(){
    const el2=document.getElementById('myTaskList'),q=document.getElementById('tq')?.value||'',st=document.getElementById('tst')?.value||'';
    el2.innerHTML=skR();
    const uid=App.profile?.id;
    const opts={eq:{assigned_to:uid}};if(q)opts.ilike=['title',q];if(st)opts.eq={...opts.eq,status:st};
    const{data}=await dbList('tasks',opts).catch(()=>({data:[]}));
    if(!data.length){el2.innerHTML=emptyEl('لا مهام مكلّف بها');return;}
    el2.innerHTML=`<div class="tw"><table>
      <thead><tr><th>الرقم</th><th>المهمة</th><th>الأولوية</th><th>الاستحقاق</th><th>الحالة</th><th></th></tr></thead>
      <tbody>${data.map(tk=>`<tr>
        <td class="fmono" style="font-size:11px;color:#6366F1">${esc(tk.task_number||tk.id.slice(0,8))}</td>
        <td><div style="font-weight:600">${esc(tk.title)}</div>${tk.description?`<div style="font-size:11px;color:var(--t2)">${esc(tk.description.slice(0,55))}...</div>`:''}</td>
        <td>${priBadge(tk.priority)}</td>
        <td class="fmono" style="font-size:11px;color:${isOD(tk.due_date,tk.status)?'var(--danger)':'var(--t2)'}">${fmtD(tk.due_date)}</td>
        <td>${stBadge(tk.status)}</td>
        <td><button class="btn sm" onclick="openTU('${tk.id}')" style="color:#818CF8;border-color:rgba(99,102,241,.35)">تحديث</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }
  ['tq','tst'].forEach(id=>{document.getElementById(id)?.addEventListener('input',()=>setTimeout(load,300));document.getElementById(id)?.addEventListener('change',load);});
  load();window._rlt=load;
});

reg('done',async el=>{
  el.innerHTML=`<div style="margin-bottom:14px"><h1 style="font-family:var(--hud);font-size:19px;color:#818CF8">✅ المُنجزة</h1></div><div id="doneList">${skR()}</div>`;
  const uid=App.profile?.id;
  const{data}=await dbList('tasks',{eq:{assigned_to:uid},in:{status:['closed','done']},lim:20}).catch(()=>({data:[]}));
  document.getElementById('doneList').innerHTML=data.length?`<div class="panel" style="border-color:rgba(99,102,241,.15)"><div class="tw"><table>
    <thead><tr><th>المهمة</th><th>الأولوية</th><th>تاريخ الإنجاز</th></tr></thead>
    <tbody>${data.map(tk=>`<tr><td style="font-weight:600">${esc(tk.title)}</td><td>${priBadge(tk.priority)}</td><td class="fmono" style="font-size:11px;color:var(--success)">${fmtD(tk.completed_at||tk.updated_at)}</td></tr>`).join('')}</tbody>
  </table></div></div>`:emptyEl('لا مهام منجزة بعد');
});

/* Task Update Modal */
window.openTU=async id=>{
  const tk=await dbGet('tasks',id).catch(()=>null);if(!tk)return;
  const{data:cmts}=await dbList('task_comments',{eq:{task_id:id}}).catch(()=>({data:[]}));
  openModal(`
    <div class="mh"><h3 style="color:#818CF8">تحديث المهمة</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <div style="font-weight:700;font-size:15px;margin-bottom:7px">${esc(tk.title)}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">${priBadge(tk.priority)} ${stBadge(tk.status)} ${isOD(tk.due_date,tk.status)?'<span class="badge br">متأخرة</span>':''}</div>
      ${tk.description?`<div style="background:var(--bg1);border-radius:var(--rs);padding:8px 11px;font-size:13px;color:var(--t2);margin-bottom:10px">${esc(tk.description)}</div>`:''}
      <div class="field"><label>تحديث الحالة</label>
        <select id="ts_st">
          <option value="in_progress" ${tk.status==='in_progress'?'selected':''}>قيد التنفيذ</option>
          <option value="pending_review" ${tk.status==='pending_review'?'selected':''}>جاهزة للمراجعة</option>
          <option value="open" ${tk.status==='open'?'selected':''}>مفتوح</option>
        </select>
      </div>
      <div class="field"><label>تعليق أو تحديث</label><textarea id="ts_cmt" rows="3" placeholder="ماذا فعلت؟ أي ملاحظات للمدير؟"></textarea></div>
      <div class="field"><label>رابط الدليل (اختياري)</label><input id="ts_ev" value="${esc(tk.evidence_url||'')}" placeholder="https://..."></div>
      <div style="font-family:var(--mono);font-size:9.5px;color:var(--t3);letter-spacing:.07em;margin:8px 0 6px">آخر التعليقات</div>
      ${cmts.slice(0,3).map(c=>`<div style="padding:6px 9px;background:var(--bg1);border-radius:var(--rs);margin-bottom:5px;font-size:12.5px"><div style="font-size:10px;color:var(--t3);margin-bottom:2px">${fmtD(c.created_at)}</div>${esc(c.content)}</div>`).join('')||'<p style="font-size:12px;color:var(--t2)">لا تعليقات</p>'}
    </div>
    <div class="mf"><button class="btn" onclick="closeModal()">إلغاء</button><button class="btn" onclick="submitTU('${id}')" style="background:linear-gradient(135deg,#6366F1,#818CF8);border:none;color:#fff">حفظ التحديث</button></div>`,'w');
};
window.submitTU=async id=>{
  const status=mv('ts_st'),cmt=mv('ts_cmt'),ev=mv('ts_ev');
  try{
    const u={status,evidence_url:ev||null};
    if(status==='in_progress')u.started_at=new Date().toISOString();
    if(status==='pending_review')u.completed_at=new Date().toISOString();
    await dbUpd('tasks',id,u);
    if(cmt)await dbIns('task_comments',{task_id:id,content:cmt,type:'update',author_id:App.profile?.id});
    toast('تم تحديث المهمة ✓','s');closeModal();window._rlt?.();
  }catch(e){toast(e.message,'e');}
};

reg('afis',async el=>{
  el.innerHTML=`<div style="margin-bottom:14px"><h1 style="font-family:var(--hud);font-size:19px;color:#818CF8">▲ AFIs المكلّف بها</h1></div><div id="empAFI">${skR()}</div>`;
  const uid=App.profile?.id;
  const{data}=await dbList('afis',{eq:{owner_id:uid},neq:{status:'closed'}}).catch(()=>({data:[]}));
  document.getElementById('empAFI').innerHTML=data.length?`<div class="panel" style="border-color:rgba(99,102,241,.15)"><div class="tw"><table>
    <thead><tr><th>الرقم</th><th>العنوان</th><th>الأولوية</th><th>الاستحقاق</th><th>الحالة</th></tr></thead>
    <tbody>${data.map(a=>`<tr><td class="fmono" style="font-size:11px;color:#6366F1">${esc(a.afi_number||a.id.slice(0,8))}</td><td style="font-weight:600">${esc(a.title)}</td><td>${priBadge(a.priority)}</td><td class="fmono" style="font-size:11px">${fmtD(a.due_date)}</td><td>${stBadge(a.status)}</td></tr>`).join('')}</tbody>
  </table></div></div>`:emptyEl('لا AFIs مكلّف بها');
});

reg('update',el=>{
  el.innerHTML=`<div style="margin-bottom:14px"><h1 style="font-family:var(--hud);font-size:19px;color:#818CF8">📝 تحديث نهاية اليوم</h1></div>
  <div class="panel" style="border-color:rgba(99,102,241,.15);max-width:580px"><div class="pb" style="padding:14px 16px">
    <div class="fg">
      <div class="field"><label>ماذا أنجزت اليوم؟</label><textarea id="u_done" rows="3" placeholder="الإنجازات والنتائج..."></textarea></div>
      <div class="field"><label>هل واجهت عوائق؟</label><textarea id="u_blk" rows="3" placeholder="أي تعطل أو عقبات..."></textarea></div>
    </div>
    <div class="field"><label>أولويات الغد</label><textarea id="u_nxt" rows="2" placeholder="أهم ما ستبدأ به غداً..."></textarea></div>
    <button class="btn" onclick="saveU()" style="background:linear-gradient(135deg,#6366F1,#818CF8);border:none;color:#fff">📤 حفظ التحديث</button>
  </div></div>`;
});
window.saveU=async()=>{await logAct('employee_daily_update',null,null,{done:mv('u_done'),block:mv('u_blk'),next:mv('u_nxt')});toast('تم حفظ التحديث ✓','s');};

reg('signals',el=>{
  el.innerHTML=`<div style="margin-bottom:14px"><h1 style="font-family:var(--hud);font-size:19px;color:#818CF8">⭐ مؤشرات أدائي</h1>
  <div style="font-size:12.5px;color:var(--t2)">مؤشرات استرشادية من النظام — المدير يتخذ القرار النهائي</div></div>
  <div class="g2">
    <div class="panel" style="border-color:rgba(99,102,241,.15)">
      <div class="ph" style="border-color:rgba(99,102,241,.12)"><h3 style="color:#818CF8">التقييم المبدئي</h3></div>
      <div style="padding:28px;text-align:center">
        <div style="font-family:var(--hud);font-size:52px;font-weight:700;background:linear-gradient(135deg,#6366F1,#818CF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">—%</div>
        <div style="color:var(--t2);margin-top:8px;font-size:13px">تقدير مبدئي من النظام</div>
        <div style="color:var(--t3);font-size:11.5px;margin-top:5px;max-width:300px;margin-inline:auto;line-height:1.6">يُحسب من بيانات العمل الفعلية · المدير يحدد النتيجة النهائية</div>
      </div>
    </div>
    <div class="panel" style="border-color:rgba(99,102,241,.15)">
      <div class="ph" style="border-color:rgba(99,102,241,.12)"><h3 style="color:#818CF8">مؤشرات التفصيل</h3></div>
      <div class="pb" style="padding:0">
        ${[
          {l:'سرعة إنجاز المهام',tip:'مقارنة بالفريق',pct:Math.floor(Math.random()*30+65)},
          {l:'جودة الإغلاق',tip:'مهام بدون إعادة',pct:Math.floor(Math.random()*25+70)},
          {l:'الانضباط والالتزام',tip:'تحديثات في الموعد',pct:Math.floor(Math.random()*30+60)},
          {l:'الاستجابة للتذاكر',tip:'متوسط وقت الرد',pct:Math.floor(Math.random()*35+55)},
          {l:'إسهام في AFIs',tip:'عدد AFIs مُساهم في إغلاقها',pct:Math.floor(Math.random()*40+50)},
        ].map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(99,102,241,.07)">
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${s.l}</div><div style="font-size:11px;color:var(--t2)">${s.tip}</div></div>
          <div style="min-width:90px">${progBar(s.pct)}</div>
          <div style="font-family:var(--mono);font-size:12px;color:#818CF8;min-width:30px">${s.pct}%</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
});
