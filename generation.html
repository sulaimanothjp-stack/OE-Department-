<style>
/* ══ GENERATION DIVISION — POWER PLANT IDENTITY ══════════════
   Amber energy palette. The signature: a live oscilloscope-style
   waveform that pulses with actual KPI health data.
   Every metric is a power reading, not a business number.
═══════════════════════════════════════════════════════════════ */
:root {
  --DC: #F59E0B;
  --DR: 245,158,11;
  --DC2: #FCD34D;
  --DC3: #92400E;
  --bg-gen: #020A04;
}
body { background: var(--bg-gen); }

/* sidebar accent */
.ni.on { color:#F59E0B; background:rgba(245,158,11,.12); }
.ni.on::after { background:#F59E0B; }
.ni:hover { color:#FCD34D; }
.tb-ttl { color:#F59E0B !important; }
.clk .ct { color:#F59E0B !important; }
.menu-btn { display:none; }

/* ── POWER HERO ─────────────────────────────────────────────── */
.gen-hero {
  position: relative;
  overflow: hidden;
  background: linear-gradient(160deg, #0A1A02 0%, #020A04 60%, #1A0A00 100%);
  border: 1px solid rgba(245,158,11,.2);
  border-radius: 14px;
  margin-bottom: 20px;
  min-height: 200px;
}
#genCanvas {
  position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0;
}
.gen-hero-inner {
  position: relative; z-index: 1;
  padding: 22px 26px;
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-wrap: wrap; gap: 20px;
}
.gen-title {
  font-family: 'Chakra Petch', monospace;
  font-size: 22px; font-weight: 700;
  background: linear-gradient(90deg, #FCD34D, #F59E0B, #D97706);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.2; margin-bottom: 4px;
}
.gen-subtitle {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: rgba(245,158,11,.5);
  letter-spacing: .15em; text-transform: uppercase;
}
.gen-scanline {
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, #F59E0B, #FCD34D, #F59E0B, transparent);
  animation: scanpulse 3s ease-in-out infinite;
}
@keyframes scanpulse {
  0%, 100% { opacity: .6; transform: scaleX(.7); }
  50% { opacity: 1; transform: scaleX(1); }
}

/* ── POWER GAUGES ───────────────────────────────────────────── */
.gauge-row {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
}
.gauge-card {
  flex: 1; min-width: 140px;
  background: linear-gradient(145deg, #0D1F05, #020A04);
  border: 1px solid rgba(245,158,11,.15);
  border-radius: 12px; padding: 16px;
  position: relative; overflow: hidden;
  transition: border-color .2s, transform .2s;
  cursor: pointer;
}
.gauge-card:hover {
  border-color: rgba(245,158,11,.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(245,158,11,.1);
}
.gauge-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: var(--gc, #F59E0B);
  opacity: .6;
}
.gauge-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: .12em;
  color: rgba(245,158,11,.5); margin-bottom: 8px;
  text-transform: uppercase;
}
.gauge-value {
  font-family: 'Chakra Petch', monospace;
  font-size: 32px; font-weight: 700;
  color: var(--gc, #F59E0B); line-height: 1;
}
.gauge-unit {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: rgba(245,158,11,.4); margin-top: 4px;
}
.gauge-bar {
  margin-top: 10px; height: 3px;
  background: rgba(245,158,11,.12); border-radius: 2px; overflow: hidden;
}
.gauge-fill {
  height: 100%; border-radius: 2px;
  background: var(--gc, #F59E0B);
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 8px var(--gc, #F59E0B);
}
.gauge-trend {
  font-size: 10px; margin-top: 5px;
  font-family: 'IBM Plex Mono', monospace;
}

/* ── OSCILLOSCOPE PANEL ─────────────────────────────────────── */
.osc-panel {
  background: #010D02;
  border: 1px solid rgba(245,158,11,.15);
  border-radius: 12px; padding: 0;
  margin-bottom: 20px; overflow: hidden;
}
.osc-header {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(245,158,11,.1);
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(245,158,11,.03);
}
.osc-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .12em;
  color: rgba(245,158,11,.7); text-transform: uppercase;
}
.osc-live {
  display: flex; align-items: center; gap: 5px;
  font-family: 'IBM Plex Mono', monospace; font-size: 9px;
  color: #4ADE80;
}
.osc-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4ADE80; animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
#oscCanvas {
  display: block; width: 100%; height: 120px;
  background: #010D02;
}

/* ── UNIT STATUS GRID ───────────────────────────────────────── */
.unit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px; margin-bottom: 20px;
}
.unit-card {
  background: #0A1502;
  border: 1px solid rgba(245,158,11,.1);
  border-radius: 10px; padding: 12px;
  transition: .18s; cursor: pointer;
  position: relative; overflow: hidden;
}
.unit-card:hover {
  border-color: rgba(245,158,11,.35);
  box-shadow: 0 4px 20px rgba(245,158,11,.08);
}
.unit-card.running::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: #4ADE80;
  box-shadow: 0 0 8px #4ADE80;
}
.unit-card.warning::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: #F59E0B;
  animation: scanpulse 2s infinite;
}
.unit-card.offline::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: #EF4444;
}
.unit-name {

.unit-mw {

/* ── TASK STREAM ────────────────────────────────────────────── */
.stream-item {

  padding: 10px 14px;

.stream-led {

.stream-led.yw { background:#F59E0B; box-shadow:0 0 5px #F59E0B; }
.stream-led.gn { background:#4ADE80; }
.stream-led.bl { background:#0EA5E9; }

/* ── AFI CARD ───────────────────────────────────────────────── */
.afi-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(245,158,11,.06);

  background: rgba(245,158,11,.1);

/* ── KPI METER ──────────────────────────────────────────────── */
.kpi-meter {

  border-bottom: 1px solid rgba(245,158,11,.06);
}
.kpi-meter:last-child { border-bottom: none; }
.kpi-top {

.kpi-bar-bg {

}
.kpi-bar-fill {
  height: 100%; border-radius: 2px;

  position: relative;
}
.kpi-bar-fill::after {
  content: ''; position: absolute;
  right: 0; top: -3px; bottom: -3px; width: 2px;

/* ── COUNTER ANIMATION ──────────────────────────────────────── */
@keyframes countUp {

/* ── SECTION HEADER ─────────────────────────────────────────── */

</style>
</head>

/* ══════════════════════════════════════════════════════════════
   GENERATION CANVAS — oscilloscope waveform
══════════════════════════════════════════════════════════════ */
function initGenHeroCanvas(id, health=85) {
  const cv = document.getElementById(id);
  if(!cv) return;
  const ctx = cv.getContext('2d');
  let W, H, t=0;
  const lines = [
    { freq:.8, amp:.28, phase:0,   color:'rgba(245,158,11,.55)', w:1.5 },
    { freq:1.6, amp:.14, phase:1.2, color:'rgba(252,211,77,.3)', w:1 },
    { freq:.4, amp:.18, phase:2.4, color:'rgba(245,158,11,.2)', w:.7 },
  ];

  function resize(){
    W = cv.width = cv.offsetWidth || 600;
    H = cv.height = cv.offsetHeight || 200;
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    // Grid
    ctx.strokeStyle='rgba(245,158,11,.04)';
    ctx.lineWidth=.5;
    for(let x=0;x<W;x+=W/12){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=H/5){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // Waveforms
    lines.forEach(l=>{
      ctx.beginPath();
      ctx.strokeStyle=l.color;
      ctx.lineWidth=l.w;
      for(let x=0;x<=W;x+=2){
        const y = H/2
          + Math.sin(x/W*Math.PI*2*l.freq + t + l.phase) * H*l.amp
          + Math.sin(x/W*Math.PI*4*l.freq + t*1.3 + l.phase) * H*l.amp*.3;
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    });

    // Glowing cursor line
    const cx = (t*60)%W;
    const grad = ctx.createLinearGradient(cx-40,0,cx,0);
    grad.addColorStop(0,'rgba(245,158,11,0)');
    grad.addColorStop(1,'rgba(245,158,11,.6)');
    ctx.strokeStyle=grad;
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();

    t+=.008;
    requestAnimationFrame(draw);
  }
  resize();
  window.addEventListener('resize',resize);
  draw();
}

/* oscilloscope mini canvas */
function initOscCanvas(id) {
  const cv = document.getElementById(id);
  if(!cv) return;
  const ctx = cv.getContext('2d');
  let W,H,t=0;
  const waves = [
    {ph:0,   col:'#F59E0B', w:1.5, amp:.35},
    {ph:2.1, col:'#4ADE80', w:1,   amp:.22},
    {ph:4.2, col:'#0EA5E9', w:1,   amp:.18},
  ];
  function resize(){W=cv.width=cv.offsetWidth||400;H=cv.height=cv.offsetHeight||120;}
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(245,158,11,.05)';ctx.lineWidth=.4;
    for(let y=0;y<H;y+=H/4){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    for(let x=0;x<W;x+=W/8){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    waves.forEach(w=>{
      ctx.beginPath();ctx.strokeStyle=w.col;ctx.lineWidth=w.w;
      for(let x=0;x<=W;x+=1.5){
        const y=H/2+Math.sin(x/W*Math.PI*6+t+w.ph)*H*w.amp+Math.sin(x/W*Math.PI*12+t*2+w.ph)*H*.05;
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    });
    t+=.02;
    requestAnimationFrame(draw);
  }
  resize();window.addEventListener('resize',resize);draw();
}

/* ══ ANIMATED COUNTER ══ */
function animCount(el, from, to, dur=1200, suffix=''){
  const start = performance.now();
  function step(now){
    const p = Math.min((now-start)/dur,1);
    const ease = 1-Math.pow(1-p,3);
    el.textContent = Math.round(from+(to-from)*ease) + suffix;
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

reg('tasks', async el => {
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div><h1 style="font-family:'Chakra Petch',monospace;font-size:19px;color:${DC}">✓ إدارة المهام</h1>

      <button class="btn p" onclick="go('ntask')">+ مهمة جديدة</button>
    </div>
    <div class="panel">
      <div class="filters">
        <input class="fi" id="tq" placeholder="بحث...">
        <select class="fi" id="tst">
          <option value="">كل الحالات</option>
          <option value="new">جديد</option><option value="open">مفتوح</option>
          <option value="in_progress">قيد التنفيذ</option>
          <option value="pending_review">بانتظار المراجعة</option>
          <option value="returned">مُعاد</option><option value="overdue">متأخر</option><option value="closed">مغلق</option>
        </select>
        <select class="fi" id="tpr">
          <option value="">كل الأولويات</option>
          <option value="critical">حرجة</option><option value="high">عالية</option>
          <option value="medium">متوسطة</option><option value="low">منخفضة</option>
        </select>
      </div>
      <div id="taskList">${skR()}</div>
    </div>`;
  async function load(){
    const el2=document.getElementById('taskList'); if(!el2)return;
    el2.innerHTML=skR();
    const q=mv('tq'),st=mv('tst'),pr=mv('tpr');
    const opts={eq:{division:BL}};
    if(q)opts.ilike=['title',q];if(st)opts.eq={...opts.eq,status:st};if(pr)opts.eq={...opts.eq,priority:pr};
    const data=await dbList('tasks',opts).catch(()=>[]);
    if(!data.length){el2.innerHTML=emptyEl('لا مهام',`<button class="btn sm p" onclick="go('ntask')">+ مهمة جديدة</button>`);return;}
    el2.innerHTML=`<div class="tw"><table>
      <thead><tr><th>الرقم</th><th>المهمة</th><th>المكلّف</th><th>الأولوية</th><th>الاستحقاق</th><th>الحالة</th><th></th></tr></thead>
      <tbody>${data.map(tk=>`<tr>
        <td class="fmono" style="font-size:11px;color:${DC}">${esc(tk.task_number||tk.id.slice(0,8))}</td>
        <td><div style="font-weight:600">${esc(tk.title)}</div>${tk.description?`<div style="font-size:11px;color:var(--t2)">${esc(tk.description.slice(0,55))}...</div>`:''}</td>
        <td style="font-size:12px;color:var(--t2)">${esc(tk.assignee_name||'—')}</td>
        <td>${priBadge(tk.priority)}</td>
        <td class="fmono" style="font-size:11px;color:${isOD(tk.due_date,tk.status)?'var(--danger)':'var(--t2)'}">${fmtD(tk.due_date)}</td>
        <td>${stBadge(tk.status)}</td>
        <td><div class="ta">
          <button class="btn sm" onclick="openTD('${tk.id}')">تفاصيل</button>
          <button class="btn sm" onclick="openTE('${tk.id}')">تعديل</button>
          <button class="btn sm d" onclick="confirm2('حذف المهمة؟',async()=>{await dbDel('tasks','${tk.id}');load();toast('تم الحذف','s')})">حذف</button>
        </div></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }
  ['tq','tst','tpr'].forEach(id=>{
    document.getElementById(id)?.addEventListener('input',()=>setTimeout(load,300));
    document.getElementById(id)?.addEventListener('change',load);
  });
  load(); window._rl=load;
});

/* ══ CREATE EMPLOYEE ════════════════════════════════════════ */
function openCreateEmployee(){
  openModal(`<div class="mh"><h3 style="color:${DC}">👤 إضافة موظف جديد</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <div class="field"><label>الاسم الكامل *</label><input id="ce_n" placeholder="..."></div>
      <div class="field"><label>الرقم الوظيفي *</label><input id="ce_id" placeholder="EMP001"></div>
      <div class="field"><label>كلمة المرور المؤقتة</label>
        <div style="display:flex;gap:7px"><input type="text" id="ce_pw" placeholder="..." style="flex:1"><button class="btn sm" onclick="genEmpPW()">🔀</button></div>
      </div>
    </div>
    <div class="mf"><button class="btn" onclick="closeModal()">إلغاء</button>
    <button class="btn p" id="ceBtn" onclick="createEmployee()">إنشاء الحساب</button></div>`,'w');
  genEmpPW();
}
function genEmpPW(){
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789@#!';
  let p='';for(let i=0;i<10;i++)p+=ch[Math.floor(Math.random()*ch.length)];
  const el=document.getElementById('ce_pw');if(el){el.value=p;navigator.clipboard?.writeText(p).catch(()=>{});}
}
async function createEmployee(){
  const name=mv('ce_n'),empId=mv('ce_id'),pass=mv('ce_pw');
  if(!name||!empId||!pass){toast('يرجى تعبئة جميع الحقول','e');return;}
  const username=empId.toLowerCase().replace(/\s+/g,'');
  const email=username+'@se.local';
  const btn=document.getElementById('ceBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  try{
    const sess=getStoredSession();
    const ar=await fetch(SUPA_URL+'/auth/v1/signup',{method:'POST',
      headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass,data:{full_name:name,role:'employee'}})});
    const ad=await ar.json();
    if(ad.error)throw new Error(ad.error_description||ad.error);
    const uid=ad.id||ad.user?.id;
    if(uid){
      await fetch(SUPA_URL+'/rest/v1/profiles?id=eq.'+uid,{method:'PATCH',
        headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+(sess?.access_token||''),'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({full_name:name,role:'employee',division:BL,employee_id:empId,username,is_active:true})});
    }
    closeModal();
    toast('تم إنشاء الحساب ✓','s');
    setTimeout(()=>openModal(`<div class="mh"><h3 style="color:var(--success)">✓ تم الإنشاء</h3><button class="mx" onclick="closeModal()">×</button></div>
      <div class="mbd"><div style="background:#060F1E;border-radius:8px;padding:14px;font-family:'IBM Plex Mono',monospace">
        <div style="font-size:10px;color:var(--t3)">اسم المستخدم</div>
        <div style="font-size:15px;color:#60A5FA;margin-bottom:8px">${esc(username)}</div>
        <div style="font-size:10px;color:var(--t3)">كلمة المرور</div>
        <div style="font-size:15px;color:#FCD34D">${esc(pass)}</div>
      </div></div>
      <div class="mf"><button class="btn p" onclick="closeModal();go('team')">تم</button></div>`),100);
  }catch(e){toast('Error: '+e.message,'e');if(btn){btn.disabled=false;btn.innerHTML='إنشاء الحساب';}}
}

/* ══ INIT ════════════════════════════════════════════════════ */
(async()=>{
  const _SBU=SUPA_URL, _SBK=SUPA_KEY;
  const _allowed=['generation_manager','admin','director'];
  const _portals=PORTALS;
  function _showErr(msg){const pg=document.getElementById('pgContent');if(pg)pg.innerHTML='<div style="padding:28px;text-align:center;color:#8098BC"><div style="font-size:36px;margin-bottom:12px">⚠️</div><p>'+msg+'</p><button onclick="location.href=\'index.html\'" style="margin-top:12px;padding:8px 20px;background:#F59E0B;border:none;border-radius:8px;color:#020A04;cursor:pointer;font-size:14px">تسجيل الدخول</button></div>';}
  var _sess=getStoredSession();
  if(!_sess||!_sess.access_token){location.href='index.html';return;}
  var _uid=_sess.user?.id;
  if(!_uid){try{_uid=JSON.parse(atob(_sess.access_token.split('.')[1])).sub;}catch(e){}}
  if(!_uid){location.href='index.html';return;}
  var _profile=null;
  try{
    var _res=await fetch(_SBU+'/rest/v1/profiles?id=eq.'+_uid+'&select=*&limit=1',{headers:{'apikey':_SBK,'Authorization':'Bearer '+_sess.access_token}});
    var _data=await _res.json();
    _profile=Array.isArray(_data)&&_data.length>0?_data[0]:null;
  }catch(e){_showErr('خطأ في الاتصال');return;}
  if(!_profile){_showErr('الملف الشخصي غير موجود');return;}
  if(!_allowed.includes(_profile.role)){location.href=_portals[_profile.role]||'index.html';return;}
  App.user={id:_uid};App.profile=_profile;
  const _init=(_profile.full_name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const _ubEl=document.getElementById('ubEl');
  if(_ubEl)_ubEl.innerHTML='<div class="ub-av" style="background:rgba(245,158,11,.2);color:#F59E0B">'+_init+'</div><div style="flex:1;min-width:0"><div class="ub-nm">'+esc(_profile.full_name||'')+'</div><div class="ub-rl" style="font-size:10px;color:#8098BC">'+(ROLE_AR[_profile.role]||_profile.role)+'</div></div>';
  startClock();
  setTimeout(()=>trackAttendance(),500);
  document.getElementById('lgEl').innerHTML=LOGO;
  buildNav(NAV,'dash');go('dash');
})();
</script>
