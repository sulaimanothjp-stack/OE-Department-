<!DOCTYPE html>
<html lang="ar" dir="rtl" id="root">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SE · بوابة الموظف</title>
<link rel="stylesheet" href="styles.css">
<style>
:root{--DC:#6366F1;--DR:99,102,241}
body{background:#020912}
.ni.on{color:#818CF8;background:rgba(99,102,241,.13)}.ni.on::after{background:#6366F1}
.tb-ttl{color:#818CF8!important}.clk .ct{color:#6366F1!important}
.ld .d{background:#6366F1;box-shadow:0 0 6px #6366F1}

/* greeting card */
.greet-card{position:relative;overflow:hidden;background:linear-gradient(135deg,#6366F108,#020912);border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:20px 24px;margin-bottom:16px}
#gcv{position:absolute;inset:0;z-index:0}
.gc-in{position:relative;z-index:1}
.gc-in h1{font-family:var(--hud);font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.gc-in .gs{font-size:12.5px;color:rgba(99,102,241,.6)}
.greet-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#6366F1,#818CF8,transparent);animation:sba 4s linear infinite;background-size:200%}
@keyframes sba{0%{background-position:200%}100%{background-position:-200%}}

/* task row */
.tr2{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(99,102,241,.07);cursor:pointer;transition:.13s}
.tr2:hover{background:rgba(99,102,241,.04)}.tr2:last-child{border-bottom:none}
.tck{width:22px;height:22px;border-radius:6px;border:1.5px solid #6366F1;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:12px}
.tck.done{background:#6366F1;border-color:#6366F1}
.tt{font-size:13.5px;font-weight:600;margin-bottom:3px}
.tm2{display:flex;gap:5px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--t2)}

/* stage buttons */
.stg-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.stg-btn{padding:4px 11px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid;transition:.14s}
.stg-btn.active{color:#fff!important}
.stg-open{border-color:rgba(99,102,241,.4);color:#818CF8;background:rgba(99,102,241,.1)}
.stg-open.active{background:#6366F1;border-color:#6366F1}
.stg-ong{border-color:rgba(37,99,235,.4);color:#60A5FA;background:rgba(37,99,235,.1)}
.stg-ong.active{background:#2563EB;border-color:#2563EB}
.stg-pnd{border-color:rgba(245,158,11,.4);color:#FCD34D;background:rgba(245,158,11,.1)}
.stg-pnd.active{background:#F59E0B;border-color:#F59E0B}
.stg-hld{border-color:rgba(107,114,128,.4);color:#9CA3AF;background:rgba(107,114,128,.1)}
.stg-hld.active{background:#6B7280;border-color:#6B7280}
.stg-cls{border-color:rgba(16,185,129,.4);color:#34D399;background:rgba(16,185,129,.1)}
.stg-cls.active{background:#10B981;border-color:#10B981}

/* timeline */
.tl-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid rgba(99,102,241,.07)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;background:#6366F1;flex-shrink:0;margin-top:5px}
.tl-info{flex:1}
.tl-msg{font-size:13px;margin-bottom:2px}
.tl-ts{font-family:var(--mono);font-size:10px;color:var(--t3)}

/* ticket item */
.tkt-item{padding:11px 14px;border-bottom:1px solid rgba(99,102,241,.07);cursor:pointer;transition:.13s}
.tkt-item:hover{background:rgba(99,102,241,.04)}.tkt-item:last-child{border-bottom:none}

/* performance */
.perf-bar{height:8px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:5px}
.perf-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#6366F1,#818CF8);transition:width .6s ease}

.ptr{cursor:pointer}
</style>
</head>
<body>
<div class="shell">
<aside class="sb">
  <div class="sb-brand">
    <img src="se-logo.png.PNG" alt="SE" style="height:28px;width:auto;object-fit:contain">
    <div><div class="sb-t1" style="color:#6366F1">se</div><div class="sb-t2">بوابة الموظف</div></div>
  </div>
  <div id="ubEl" class="ub"></div>
  <nav class="nav" id="navEl"></nav>
  <div class="sb-foot">
    <button class="btn-lo" onclick="doLogout()">🚪 خروج</button>
    <button class="btn-lg" onclick="openChangePass()" title="تغيير كلمة المرور">🔐</button>
    <button class="btn-lg" onclick="toggleLang()">EN/ع</button>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="tb-ttl fhud" id="pgtitle">يومي</div>
    <div class="tb-r">
      <div class="clk"><div class="ct" id="ct"></div><div id="cd" style="font-family:var(--mono);font-size:9.5px;color:var(--t3)"></div></div>
      <button class="nbtn" onclick="openNotifs()">🔔<span class="ndot" id="ndot" style="display:none"></span></button>
      <div class="ld"><div class="d"></div></div>
    </div>
  </div>
  <div class="page" id="pgContent"></div>
</div>
</div>
<div id="tc"></div>
<script src="app.js"></script>
<script>
/* ═══ NAV ══════════════════════════════════════════════════ */
const NAV=[
  {k:'myday',   ar:'يومي',                en:'My Day',         ic:'☀️', fn:"go('myday')"},
  {k:'tasks',   ar:'مهامي',               en:'My Tasks',       ic:'✓',  fn:"go('tasks')"},
  {k:'done',    ar:'المُنجزة',            en:'Completed',      ic:'✅', fn:"go('done')"},
  {g:'المتابعة',ge:'FOLLOW-UP'},
  {k:'afis',    ar:'AFIs مكلّف بها',      en:'My AFIs',        ic:'▲',  fn:"go('afis')"},
  {k:'tickets', ar:'تذاكري',              en:'My Tickets',     ic:'🎫', fn:"go('tickets')"},
  {g:'اليوم',ge:'TODAY'},
  {k:'update',  ar:'تحديث نهاية اليوم',  en:'Daily Update',   ic:'📝', fn:"go('update')"},
  {k:'signals', ar:'مؤشر أدائي',         en:'My Performance', ic:'⭐', fn:"go('signals')"},
];
const PAGES={};
function reg(k,fn){PAGES[k]=fn;}
function go(k){
  const item=NAV.find(n=>n.k===k);
  document.getElementById('pgtitle').textContent=item?(App.lang==='ar'?item.ar:item.en):k;
  buildNav(NAV,k);
  const ct=document.getElementById('pgContent');ct.innerHTML='<div class="fade" id="pg"></div>';
  (PAGES[k]||function(el){el.innerHTML='<p style="padding:40px;color:var(--t3)">قيد البناء…</p>';})(document.getElementById('pg'));
  window.scrollTo(0,0);
}

/* ═══ STAGES ══════════════════════════════════════════════ */
const STAGES={
  open:        {ar:'مفتوحة',   en:'Open',      db:'open',          cls:'stg-open'},
  in_progress: {ar:'جاري',    en:'On-going',  db:'in_progress',   cls:'stg-ong'},
  pending:     {ar:'معلقة',   en:'Pending',   db:'pending_review', cls:'stg-pnd'},
  on_hold:     {ar:'موقوفة',  en:'Hold',      db:'returned',       cls:'stg-hld'},
  closed:      {ar:'أنجزت',   en:'Done',      db:'closed',         cls:'stg-cls'},
};
function dbStToKey(dbStatus){
  for(const[k,v]of Object.entries(STAGES)){if(v.db===dbStatus)return k;}
  return dbStatus==='new'?'open':dbStatus==='overdue'?'in_progress':'open';
}

function stgBtns(currentDb, taskId){
  return Object.entries(STAGES).map(([k,s])=>{
    const isActive = s.db===currentDb || (currentDb==='new'&&k==='open') || (currentDb==='overdue'&&k==='in_progress');
    return `<button class="stg-btn ${s.cls}${isActive?' active':''}" onclick="updateStage('${taskId}','${s.db}','${k}')">${App.lang==='ar'?s.ar:s.en}</button>`;
  }).join('');
}

window.updateStage=(id, dbStatus, stageKey, taskTitle)=>{
  if(dbStatus==='closed'){
    // Closed: ask for evidence + email confirmation
    openModal(`<div class="mh" style="border-color:rgba(16,185,129,.2)">
      <h3 style="color:#34D399">✅ إغلاق المهمة</h3>
      <button class="mx" onclick="closeModal()">×</button>
    </div>
    <div class="mbd">
      <div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:13px;color:#34D399">
        أنت على وشك إغلاق هذه المهمة وإرسال الإنجاز للمدير
      </div>
      <div class="field">
        <label>📧 هل أرسلت الإنجاز لمديرك بالإيميل؟</label>
        <div style="display:flex;gap:8px;margin-top:6px">
          <button id="evi_yes" onclick="setEviChoice(true)" class="btn" style="flex:1;border-color:rgba(16,185,129,.3);color:#34D399">✅ نعم أرسلت</button>
          <button id="evi_no"  onclick="setEviChoice(false)" class="btn" style="flex:1;border-color:rgba(107,114,128,.3);color:#9CA3AF">⏭ لا / لاحقاً</button>
        </div>
      </div>
      <div id="evi_ref_box" style="display:none">
        <div class="field">
          <label>📎 رقم المرجع أو رابط الإيميل</label>
          <input id="evi_ref" placeholder="مثال: EML-2024-001 أو رابط..." autocomplete="off">
          <div style="font-size:11px;color:var(--t2);margin-top:3px">اختياري — يساعد المدير في التحقق</div>
        </div>
      </div>
      <div class="field">
        <label>📝 ملاحظة للمدير (اختياري)</label>
        <textarea id="stage_note" rows="3" placeholder="ملاحظات الإنجاز، أي تفاصيل يحتاجها المدير..." style="width:100%;background:var(--bg1);border:1px solid var(--bd);color:var(--t1);border-radius:var(--rs);padding:8px 10px;font-size:13px;font-family:'IBM Plex Sans Arabic',sans-serif"></textarea>
      </div>
    </div>
    <div class="mf">
      <button class="btn" onclick="closeModal()">إلغاء</button>
      <button class="btn" onclick="doCloseTask('${id}')" style="background:linear-gradient(135deg,#10B981,#34D399);border:none;color:#fff">تأكيد الإغلاق</button>
    </div>`);
  } else {
    // Other stages: quick notes popup
    openModal(`<div class="mh" style="border-color:rgba(99,102,241,.2)">
      <h3 style="color:#818CF8">${STAGES[stageKey]?.ic||''} تحديث المرحلة إلى: ${App.lang==='ar'?STAGES[stageKey]?.ar:STAGES[stageKey]?.en}</h3>
      <button class="mx" onclick="closeModal()">×</button>
    </div>
    <div class="mbd">
      <div class="field">
        <label>📝 ملاحظة للمدير <span style="color:var(--t3);font-size:11px">(اختياري)</span></label>
        <textarea id="stage_note" rows="4" placeholder="مثال: بدأت العمل على التقرير وسأنتهي غداً... أو سبب التعليق..." style="width:100%;background:var(--bg1);border:1px solid var(--bd);color:var(--t1);border-radius:var(--rs);padding:8px 10px;font-size:13px;font-family:'IBM Plex Sans Arabic',sans-serif"></textarea>
        <div style="font-size:11px;color:var(--t3);margin-top:3px">لو ما عندك ملاحظات اتركه فارغاً</div>
      </div>
    </div>
    <div class="mf">
      <button class="btn" onclick="closeModal()">إلغاء</button>
      <button class="btn" onclick="doUpdateStage('${id}','${dbStatus}','${stageKey}')" style="background:linear-gradient(135deg,#6366F1,#818CF8);border:none;color:#fff">تحديث</button>
    </div>`);
  }
};

let _eviChoice = false;
window.setEviChoice = (yes) => {
  _eviChoice = yes;
  const yesBtn = document.getElementById('evi_yes');
  const noBtn  = document.getElementById('evi_no');
  const refBox = document.getElementById('evi_ref_box');
  if(yesBtn) { yesBtn.style.background = yes ? 'rgba(16,185,129,.2)' : ''; yesBtn.style.borderColor = yes ? 'rgba(16,185,129,.5)' : 'rgba(16,185,129,.3)'; }
  if(noBtn)  { noBtn.style.background  = !yes ? 'rgba(107,114,128,.15)' : ''; }
  if(refBox)   refBox.style.display = yes ? 'block' : 'none';
};

window.doCloseTask = async (id) => {
  const note    = mv('stage_note');
  const eviRef  = mv('evi_ref');
  const emailSent = _eviChoice;
  try{
    const upd = { status:'closed', completed_at:new Date().toISOString(), updated_at:new Date().toISOString() };
    if(eviRef)  upd.evidence_url  = eviRef;
    if(emailSent) upd.quality_score = 80; // flag that email was sent
    await dbUpd('tasks', id, upd);
    // Save comment with note + evidence info
    const cmtText = [
      '✅ أُغلقت المهمة',
      emailSent ? ('📧 تم إرسال الإنجاز بالإيميل' + (eviRef ? ' — المرجع: ' + eviRef : '')) : '📧 لم يُرسل بالإيميل بعد',
      note ? ('📝 ' + note) : ''
    ].filter(Boolean).join('\n');
    await dbIns('task_comments',{task_id:id,author_id:App.profile?.id,content:cmtText,type:'closure'});
    toast('تم إغلاق المهمة وإرسالها للمدير ✓','s');
    closeModal();
    _eviChoice = false;
    if(window._rlt) window._rlt(); else go('tasks');
  }catch(e){ toast(e.message,'e'); }
};

window.doUpdateStage = async (id, dbStatus, stageKey) => {
  const note = mv('stage_note');
  try{
    const upd = { status:dbStatus, updated_at:new Date().toISOString() };
    if(dbStatus==='in_progress') upd.started_at = new Date().toISOString();
    await dbUpd('tasks', id, upd);
    // Save comment if note exists
    if(note){
      const label = App.lang==='ar' ? STAGES[stageKey]?.ar : STAGES[stageKey]?.en;
      await dbIns('task_comments',{task_id:id,author_id:App.profile?.id,content:`[${label}] ${note}`,type:'stage_update'});
    }
    toast((App.lang==='ar'?'تم التحديث: '+STAGES[stageKey]?.ar:'Updated: '+STAGES[stageKey]?.en),'s');
    closeModal();
    if(window._rlt) window._rlt(); else go('tasks');
  }catch(e){ toast(e.message,'e'); }
};

/* ═══ MYDAY ══════════════════════════════════════════════ */
reg('myday',async el=>{
  const p=App.profile, h=new Date().getHours();
  const greetAr=h<12?'صباح الخير':h<17?'مساء الخير':'مساء النور';
  const phaseAr=h<9?'ابدأ يومك':h<12?'ركّز على مهامك العاجلة':h<15?'منتصف اليوم — تابع تقدمك':h<17?'أنجز ما تستطيع قبل المساء':'وقت الإغلاق — لخّص يومك';
  el.innerHTML=`
    <div class="greet-card">
      <canvas id="gcv"></canvas>
      <div class="gc-in">
        <h1>${h<12?'🌅':h<17?'🌆':'🌙'} ${greetAr}، ${esc(p?.full_name||'')}</h1>
        <div class="gs">${phaseAr} · ${fmtD(new Date().toISOString())} · ${DIVS[p?.division]?.icon||''} ${DIVS[p?.division]?.ar||p?.division||''}</div>
      </div>
      <div class="greet-bar"></div>
    </div>

    <div class="g4 mb2" id="empStats">${skR()}</div>

    <div class="g2 mb2">
      <div class="panel" style="border-color:rgba(239,68,68,.15)">
        <div class="ph" style="border-color:rgba(239,68,68,.12)">
          <h3 style="color:#F87171;font-size:12px">🔴 متأخرة — إجراء فوري</h3>
          <button class="btn sm" onclick="go('tasks')">عرض الكل</button>
        </div>
        <div id="overdueP">${skR(2)}</div>
      </div>
      <div class="panel" style="border-color:rgba(99,102,241,.15)">
        <div class="ph" style="border-color:rgba(99,102,241,.12)">
          <h3 style="color:#818CF8;font-size:12px">🟡 أولويات اليوم</h3>
          <button class="btn sm" onclick="go('tasks')">عرض الكل</button>
        </div>
        <div id="priorP">${skR(2)}</div>
      </div>
    </div>

    <div class="g2">
      <div class="panel" style="border-color:rgba(99,102,241,.15)">
        <div class="ph" style="border-color:rgba(99,102,241,.12)">
          <h3 style="color:#818CF8;font-size:12px">⏱ آخر تحديث لمهامي</h3>
        </div>
        <div id="recentP">${skR(2)}</div>
      </div>
      <div class="panel" style="border-color:rgba(99,102,241,.15)">
        <div class="ph" style="border-color:rgba(99,102,241,.12)">
          <h3 style="color:#818CF8;font-size:12px">ℹ️ معلوماتي</h3>
        </div>
        <div id="infoP" style="padding:12px 14px">
          <div style="font-size:13px;margin-bottom:6px"><span style="color:var(--t3);font-size:11px">الاسم: </span>${esc(p?.full_name||'')}</div>
          <div style="font-size:13px;margin-bottom:6px"><span style="color:var(--t3);font-size:11px">الدور: </span>${esc(ROLE_AR[p?.role]||p?.role||'')}</div>
          <div style="font-size:13px;margin-bottom:6px"><span style="color:var(--t3);font-size:11px">الدائرة: </span>${DIVS[p?.division]?.icon||''} ${esc(DIVS[p?.division]?.ar||p?.division||'')}</div>
          <div style="font-size:13px;margin-bottom:6px"><span style="color:var(--t3);font-size:11px">الرقم الوظيفي: </span><span style="font-family:var(--mono)">${esc(p?.employee_id||p?.username||'—')}</span></div>
          ${p?.job_title?`<div style="font-size:13px"><span style="color:var(--t3);font-size:11px">المسمى: </span>${esc(p.job_title)}</div>`:''}
        </div>
      </div>
    </div>`;

  initCanvas('gcv','net','#6366F1');

  try{
    const uid=p?.id;
    const[oT,odT,oTkt,oAfi]=await Promise.all([
      dbCnt('tasks',{eq:{assigned_to:uid},neq:{status:'closed'}}),
      dbCnt('tasks',{eq:{assigned_to:uid,status:'overdue'}}),
      dbCnt('tickets',{eq:{from_user:uid},neq:{status:'closed'}}),
      dbCnt('afis',{eq:{owner_id:uid},neq:{status:'closed'}}),
    ]);
    document.getElementById('empStats').innerHTML=[
      {sl:'مهام مفتوحة',sv:oT,    cl:'',   onClick:"go('tasks')"},
      {sl:'مهام متأخرة',sv:odT,   cl:odT?'red':'grn',onClick:"go('tasks')"},
      {sl:'تذاكر',      sv:oTkt,  cl:'',   onClick:"go('tickets')"},
      {sl:'AFIs',        sv:oAfi,  cl:oAfi?'ylw':'',  onClick:"go('afis')"},
    ].map(s=>`<div class="sc ptr" onclick="${s.onClick}"><div class="sl">${s.sl}</div><div class="sv ${s.cl}">${s.sv}</div></div>`).join('');

    const{data:od}=await dbList('tasks',{eq:{assigned_to:uid,status:'overdue'},lim:3});
    document.getElementById('overdueP').innerHTML=od.length
      ?od.map(tk=>`<div class="tr2" onclick="openTU('${tk.id}')">
          <div class="tck" style="border-color:var(--danger)">!</div>
          <div style="flex:1">
            <div class="tt">${esc(tk.title)}</div>
            <div class="tm2">${priBadge(tk.priority)} <span style="color:var(--danger)">${fmtD(tk.due_date)}</span></div>
            <div class="stg-row">${stgBtns(tk.status,tk.id)}</div>
          </div>
        </div>`).join('')
      :`<div style="padding:14px;text-align:center;color:var(--success);font-size:13px">✓ لا مهام متأخرة</div>`;

    const{data:pri}=await dbList('tasks',{eq:{assigned_to:uid},in:{priority:['high','critical'],status:['new','open','in_progress']},lim:3});
    document.getElementById('priorP').innerHTML=pri.length
      ?pri.map(tk=>`<div class="tr2" onclick="openTU('${tk.id}')">
          <div class="tck"></div>
          <div style="flex:1">
            <div class="tt">${esc(tk.title)}</div>
            <div class="tm2">${priBadge(tk.priority)} استحقاق: ${fmtD(tk.due_date)}</div>
            <div class="stg-row">${stgBtns(tk.status,tk.id)}</div>
          </div>
        </div>`).join('')
      :`<div style="padding:14px;text-align:center;color:var(--t2);font-size:13px">لا مهام عاجلة</div>`;

    const{data:rec}=await dbList('tasks',{eq:{assigned_to:uid},lim:3});
    document.getElementById('recentP').innerHTML=rec.length
      ?rec.map(tk=>`<div class="tr2" onclick="openTU('${tk.id}')">
          <div class="tck${tk.status==='closed'?' done':''}">${tk.status==='closed'?'✓':''}</div>
          <div style="flex:1">
            <div class="tt">${esc(tk.title)}</div>
            <div class="tm2">${stBadge(tk.status)} ${fmtD(tk.updated_at||tk.created_at)}</div>
          </div>
        </div>`).join('')
      :`<div style="padding:14px;text-align:center;color:var(--t2);font-size:13px">لا مهام بعد</div>`;

  }catch(e){toast(e.message,'e');}
});

/* ═══ MY TASKS ══════════════════════════════════════════ */
reg('tasks',async el=>{
  el.innerHTML=`
    <div style="margin-bottom:14px">
      <h1 style="font-family:var(--hud);font-size:19px;color:#818CF8">✓ مهامي</h1>
      <div style="font-size:12.5px;color:var(--t2)">كل المهام المكلّف بها — حدّث المرحلة مباشرة من هنا</div>
    </div>
    <!-- Stage filter pills -->
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px" id="stagePills">

      ${Object.entries(STAGES).map(([k,s])=>`<button class="stg-btn ${s.cls}" id="sp_${k}" onclick="filterStage('${s.db}')">${App.lang==='ar'?s.ar:s.en}</button>`).join('')}
    </div>
    <div class="panel" style="border-color:rgba(99,102,241,.15)">
      <div style="padding:8px 12px;border-bottom:1px solid rgba(99,102,241,.1)">

      </div>

    </div>`;

  let _stFilter='';

    _stFilter=st;
    document.querySelectorAll('[id^="sp_"]').forEach(b=>b.classList.remove('active'));
    const tid=st?'sp_'+Object.keys(STAGES).find(k=>STAGES[k].db===st):'sp_all';
    document.getElementById(tid)?.classList.add('active');
    load();
  };
  async function load(){
    const el2=document.getElementById('myTaskList');if(!el2)return;
    el2.innerHTML=skR();
    const q=document.getElementById('tq')?.value||'';
    const uid=App.profile?.id;
    const opts={eq:{assigned_to:uid}};
    if(_stFilter)opts.eq={...opts.eq,status:_stFilter};
    if(q)opts.ilike=['title',q];
    const{data}=await dbList('tasks',opts).catch(()=>({data:[]}));
    if(!data.length){el2.innerHTML=emptyEl('لا مهام');return;}
    el2.innerHTML=data.map(tk=>`

              <span style="color:${isOD(tk.due_date,tk.status)?'var(--danger)':'var(--t2)'}">📅 ${fmtD(tk.due_date)}</span>

            </div>

            <!-- Stage buttons -->
            <div class="stg-row">${stgBtns(tk.status,tk.id)}</div>

          <button class="btn sm" onclick="openTU('${tk.id}')" style="flex-shrink:0;color:#818CF8;border-color:rgba(99,102,241,.3)">💬 تفاصيل</button>
        </div>

  }

      </div>

  const uid=App.profile?.id;
  try{
    const[total,closed,overdue,inprog,open]=await Promise.all([
      dbCnt('tasks',{eq:{assigned_to:uid}}),
      dbCnt('tasks',{eq:{assigned_to:uid,status:'closed'}}),
      dbCnt('tasks',{eq:{assigned_to:uid,status:'overdue'}}),
      dbCnt('tasks',{eq:{assigned_to:uid,status:'in_progress'}}),
      dbCnt('tasks',{eq:{assigned_to:uid,status:'open'}}),
    ]);
    const rate=total?Math.round(closed/total*100):0;
    const score=Math.max(0,Math.min(100,rate - overdue*8 + inprog*3));
    document.getElementById('perfStats').innerHTML=[
      {sl:'إجمالي المهام',sv:total,  cl:''},
      {sl:'معدل الإنجاز',  sv:rate+'%',cl:rate>=80?'grn':rate>=50?'ylw':'red'},
      {sl:'مُنجزة',         sv:closed, cl:'grn'},
      {sl:'متأخرة',         sv:overdue,cl:overdue?'red':'grn'},
    ].map(s=>`<div class="sc"><div class="sl">${s.sl}</div><div class="sv ${s.cl}">${s.sv}</div></div>`).join('');

    document.getElementById('perfDetails').innerHTML=`
      ${[
        {l:'المُنجزة',v:closed,t:total,c:'#34D399'},
        {l:'قيد التنفيذ',v:inprog,t:total,c:'#60A5FA'},
        {l:'مفتوحة',v:open,t:total,c:'#818CF8'},
        {l:'متأخرة',v:overdue,t:total,c:'#F87171'},
      ].map(s=>`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px">
          <span>${s.l}</span><span style="color:${s.c};font-family:var(--mono)">${s.v}/${s.t}</span>
        </div>
        <div class="perf-bar"><div class="perf-fill" style="width:${s.t?Math.round(s.v/s.t*100):0}%;background:${s.c}"></div></div>
      </div>`).join('')}
      <div style="margin-top:14px;text-align:center">
        <div style="font-family:var(--hud);font-size:38px;font-weight:700;background:linear-gradient(135deg,#6366F1,#818CF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${score}</div>
        <div style="font-size:12px;color:var(--t3)">نقاط الأداء</div>
      </div>`;

    const tips=[];
    if(overdue>0)tips.push({ic:'⚠️',t:'لديك '+overdue+' مهمة متأخرة — اعمل عليها اليوم',c:'var(--danger)'});
    if(inprog>3)tips.push({ic:'💡',t:'لديك '+inprog+' مهام قيد التنفيذ — ركّز على إنهاء الأهم',c:'var(--warning)'});
    if(rate>=80)tips.push({ic:'🌟',t:'أداء ممتاز! معدل إنجاز '+rate+'%',c:'var(--success)'});
    if(!tips.length)tips.push({ic:'✓',t:'أداء جيد — استمر في التقدم',c:'var(--success)'});
    document.getElementById('perfTips').innerHTML=tips.map(tp=>
      `<div style="padding:9px 10px;background:var(--bg1);border-radius:var(--rs);margin-bottom:8px;display:flex;gap:8px;align-items:flex-start">
        <span>${tp.ic}</span><span style="font-size:13px;color:${tp.c}">${tp.t}</span>
      </div>`).join('');
  }catch(e){toast(e.message,'e');}
});

/* ═══ CHANGE PASSWORD ═══════════════════════════════════ */
window.openChangePass=()=>{
  openModal(`<div class="mh"><h3 style="color:#818CF8">🔐 تغيير كلمة المرور</h3><button class="mx" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <div class="field"><label>كلمة المرور الجديدة</label>
        <div style="display:flex;gap:7px">
          <input type="text" id="cp_new" placeholder="كلمة مرور جديدة...">
          <button class="btn sm" onclick="genCPW()">🔀</button>
        </div>
      </div>
      <div id="cp_show" style="background:#070F1D;border:1px solid rgba(99,102,241,.25);border-radius:8px;padding:10px;font-family:var(--mono);font-size:15px;font-weight:700;color:#818CF8;margin-bottom:8px;display:none"></div>
      <p style="font-size:11.5px;color:var(--t2)">ستُسجَّل خارجاً بعد التغيير</p>
    </div>
    <div class="mf"><button class="btn" onclick="closeModal()">إلغاء</button>
    <button class="btn" onclick="doChangePass()" style="background:linear-gradient(135deg,#6366F1,#818CF8);border:none;color:#fff">حفظ</button></div>`);
};
window.genCPW=()=>{
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789@#$!';
  let p='';for(let i=0;i<10;i++)p+=ch[Math.floor(Math.random()*ch.length)];
  const el=document.getElementById('cp_new');if(el)el.value=p;
  const sh=document.getElementById('cp_show');if(sh){sh.textContent=p;sh.style.display='block';}
  navigator.clipboard?.writeText(p).catch(()=>{});
};
window.doChangePass=async()=>{
  const np=mv('cp_new');if(!np||np.length<6){toast('6 أحرف على الأقل','e');return;}
  const sess=getStoredSession();
  try{
    const res=await fetch(SB_URL+'/auth/v1/user',{method:'PUT',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+(sess?.access_token||''),'Content-Type':'application/json'},
      body:JSON.stringify({password:np})});
    const d=await res.json();
    if(d.error)throw new Error(d.error_description||d.error);
    toast('تم التغيير ✓ — جارٍ تسجيل الخروج...','s');
    setTimeout(doLogout,2000);
  }catch(e){toast('خطأ: '+e.message,'e');}
};

window.openNotifs=()=>toast('لا إشعارات جديدة','i');
